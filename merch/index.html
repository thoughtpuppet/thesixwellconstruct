<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>merch · the six.well construct</title>

<!-- 
  ============================================================
  the six.well construct / merch  —  v6 (AGGREGATOR)
  ============================================================
  
  ARCHITECTURE:
    MERCH is the commerce engine for the whole construct.
    Products are organized by SOURCE VENTURE, not by sub-brand.
    Each source venture's color is carried through the UI:
      - filter chip active state
      - product card border on hover
      - category dot + label on each card
      - cart drawer item category tag
      - add-to-cart button hover
    
    Current sources:
      six.well      #F7A226   garments, construct-originating
      thoughtpuppet #0581C1   artifacts, ART-originating
    
    Adding a new source (e.g. tattooing flash):
      1. add entry to SOURCES constant
      2. add products to PRODUCTS array with matching category key
      3. a filter chip auto-generates from SOURCES

  TYPE:
    Inter 900 (display, UI) — matches landing wordmark
    Times New Roman (descriptors, category labels, metadata)

  SHOPIFY INTEGRATION:
    per-product Shopify Buy Button mount points marked inside .card-frame.
    SDK init block at bottom of <body>, commented out.
    Local cart prototype stays active during migration.

  REWRITE MARKERS:
    intro descriptor — one short line in your voice
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/transitions.css">

<style>
  /* ============================================================
     DESIGN TOKENS
  ============================================================ */
  :root {
    --bg:        #0e0e0e;
    --bg-raised: #111111;
    --bg-drawer: #0a0a0a;

    --accent:    #FCB867;            /* wordmark amber */
    --accent-hot:#F7A226;            /* MERCH node color — title + six.well source */

    --ring:      #6D3D15;
    --ring-soft: rgba(109,61,21,0.4);
    --ring-faint:rgba(109,61,21,0.18);

    /* all text keyed to amber at descending opacity */
    --text:      #FCB867;
    --text-mute: rgba(252,184,103,0.55);
    --text-dim:  rgba(252,184,103,0.30);
    --text-ghost:rgba(252,184,103,0.13);

    --s1:4px; --s2:8px; --s3:12px; --s4:16px;
    --s5:24px; --s6:40px; --s7:64px; --s8:96px;

    --sans: 'Inter','Helvetica Neue',Arial,sans-serif;
    --serif:'Times New Roman',Times,serif;

    --t-fast:0.18s cubic-bezier(0.2,0,0.2,1);
    --t-med: 0.35s cubic-bezier(0.2,0,0.2,1);

    /* driven by JS — switches to the active filter's venture color.
       defaults to MERCH hot orange for the "all" state. */
    --title-color: #F7A226;
  }

  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body {
    background:var(--bg); color:var(--text);
    font-family:var(--sans);
    min-height:100vh; overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  a { color:inherit; text-decoration:none; }
  button { background:none; border:none; color:inherit; font:inherit; cursor:pointer; }

  /* ============================================================
     AMBIENT
  ============================================================ */
  .grain {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0.035; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============================================================
     HEADER
  ============================================================ */
  header.top {
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:var(--s5) var(--s6);
  }
  .wordmark {
    font-family:var(--sans); font-weight:900;
    font-size:18px; letter-spacing:-0.05em;
    color:var(--accent); opacity:0.82;
    transition:opacity var(--t-fast);
  }
  .wordmark:hover { opacity:1; }
  .cart-toggle {
    display:flex; align-items:center; gap:var(--s3);
    padding:var(--s2) var(--s4);
    border:5px solid var(--ring-soft);
    transition:border-color var(--t-fast), background var(--t-fast);
  }
  .cart-toggle:hover { border-color:var(--accent); background:rgba(252,184,103,0.04); }
  .cart-label {
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--text-mute);
  }
  .cart-count {
    font-family:var(--sans); font-weight:700; font-size:12px;
    color:var(--accent); min-width:14px; text-align:right;
  }
  .cart-count.pulse { animation:pulse 0.4s ease-out; }
  @keyframes pulse {
    0%   { transform:scale(1);   }
    40%  { transform:scale(1.45); }
    100% { transform:scale(1);   }
  }

  /* ============================================================
     MAIN
  ============================================================ */
  main {
    position:relative; z-index:2;
    max-width:1440px; margin:0 auto;
    padding:var(--s8) var(--s6) var(--s7);
  }

  /* ============================================================
     INTRO BREADCRUMB
     "everything sellable from the construct" floats above MERCH.
     when a category is active — faded, same type as the descriptor.
     hidden on "all".
  ============================================================ */
  .intro-above {
    font-family: var(--serif);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mute);
    opacity: 0;
    margin-bottom: -10px;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .intro-above.visible { opacity: 0.45; }

  /* ============================================================
     INTRO — title in MERCH hot orange, descriptor muted serif
  ============================================================ */
  .intro {
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:var(--s6); margin-bottom:var(--s8);
  }
  .intro-left {
    display:flex; flex-direction:column; align-items:flex-start;
  }
  .intro h1 {
    font-family:var(--sans); font-weight:900;
    font-size:clamp(80px,14vw,220px);
    letter-spacing:-0.05em; line-height:0.88;
    color:var(--title-color);
    transition:color 0.3s cubic-bezier(0.2,0,0.2,1);
  }
  .intro p {
    font-family:var(--serif); font-size:12px;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--text-mute); padding-bottom:var(--s4);
    max-width:260px; text-align:right; line-height:1.6;
    transition: opacity 0.2s ease, color 0.3s ease;
  }

  /* ============================================================
     FILTER BAR — two rows: source venture then type.
     Copied exactly from art/index.html chip system.
     Row 1: source. Row 2: type (only when source active).
     Row 2 collapses naturally when empty.
  ============================================================ */
  nav.filters {
    margin-bottom:var(--s6);
  }

  .filter-row {
    display:flex; align-items:center;
    gap:var(--s5); flex-wrap:wrap;
    padding-bottom:var(--s4);
  }
  .filter-row + .filter-row { padding-top:var(--s2); padding-bottom:var(--s5); }

  /* individual chip */
  .chip {
    position:relative;
    font-family:var(--sans); font-weight:500;
    font-size:13px; letter-spacing:0.04em;
    text-transform:lowercase; color:var(--text-mute);
    padding:var(--s2) 0;
    transition:color var(--t-fast);
  }
  .chip:hover { color:var(--text); }
  .chip.active { color:var(--text); }

  /* underline on label span only, not count — uses --src-color */
  .chip.active .chip-label::after {
    content:"";
    position:absolute; left:0; bottom:-1px;
    width:100%; height:2px;
    background:var(--src-color, var(--accent));
  }

  /* dot to the left — uses --src-color */
  .chip.active::before {
    content:"";
    position:absolute; left:-10px; top:50%;
    width:4px; height:4px; border-radius:50%;
    background:var(--src-color, var(--accent));
    transform:translateY(-50%);
  }

  .chip-label { position:relative; }

  .chip-count {
    font-family:var(--serif); font-size:10px;
    color:var(--text-dim); margin-left:2px;
    vertical-align:super;
  }

  /* ============================================================
     GRID
  ============================================================ */
  .grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:var(--s7) var(--s6);
  }

  /* ============================================================
     SIZE + COLOR SELECTORS
  ============================================================ */
  .card-sizes {
    display:flex; flex-wrap:wrap; gap:var(--s1);
    margin-bottom:var(--s3);
  }
  .size-pill {
    font-family:var(--sans); font-weight:500;
    font-size:10px; letter-spacing:0.08em;
    color:var(--text-mute); text-transform:uppercase;
    border:5px solid var(--ring-soft);
    padding:3px 8px;
    cursor:pointer; background:none;
    transition:color var(--t-fast), border-color var(--t-fast), background var(--t-fast);
  }
  .size-pill:hover {
    color:var(--src-color, var(--accent));
    border-color:var(--src-color, var(--accent));
  }
  .size-pill.selected {
    color:var(--bg);
    background:var(--src-color, var(--accent));
    border-color:var(--src-color, var(--accent));
  }
  .card-colors {
    display:flex; gap:var(--s2); align-items:center;
    margin-bottom:var(--s3);
  }
  .color-swatch {
    width:16px; height:16px; border-radius:50%;
    cursor:pointer; flex-shrink:0;
    border:5px solid rgba(255,255,255,0.08);
    transition:transform var(--t-fast), box-shadow var(--t-fast);
  }
  .color-swatch:hover { transform:scale(1.2); }
  .color-swatch.selected {
    box-shadow:0 0 0 2px var(--bg), 0 0 0 3.5px var(--src-color, var(--accent));
  }
  .color-label {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-dim); margin-left:var(--s1);
  }
  /* flashes when user tries to add without selecting a size */
  .size-required {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.16em; text-transform:uppercase;
    color:var(--src-color, var(--accent));
    opacity:0; min-height:14px;
    transition:opacity var(--t-fast);
    margin-bottom:var(--s2);
  }
  .size-required.visible { opacity:0.8; }

  /* ============================================================
     PRODUCT CARD
     border-color on hover = source venture color via --src-color
     set inline on each card by JS
  ============================================================ */
  .card { display:flex; flex-direction:column; }

  .card-frame {
    position:relative;
    aspect-ratio:4/5;
    background:var(--bg-raised);
    border:5px solid var(--ring-soft);
    overflow:hidden;
    transition:border-color var(--t-med);
  }
  /* hover border uses venture color */
  .card:hover .card-frame {
    border-color:var(--src-color, var(--accent));
  }

  /* catalog-number placeholder — delete when real images arrive */
  .card-plaque {
    position:absolute; top:var(--s4); left:var(--s4);
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; color:var(--text-dim);
    text-transform:uppercase;
  }
  .card-number {
    position:absolute; top:50%; right:var(--s5);
    transform:translateY(-50%);
    font-family:var(--serif);
    font-size:clamp(72px,9vw,112px); line-height:1;
    color:var(--text-ghost); font-weight:400; letter-spacing:-0.02em;
  }

  /* edition badge — bottom-left of frame, Times Roman, dim */
  .card-edition {
    position: absolute; bottom: var(--s4); left: var(--s4);
    font-family: var(--serif); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-dim);
  }

  /* painting card — dimensions + medium replace size/color */
  .card-dims {
    font-family: var(--serif); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: var(--s3);
    margin-bottom: var(--s3);
    border-bottom: 5px solid var(--ring-faint);
  }

  /* acquire button — painting CTA, distinct from add to cart */
  .card-acquire {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s3) 0;
    border-top: 5px solid var(--ring-faint);
    font-family: var(--sans); font-weight: 500;
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--text-mute); text-transform: uppercase;
    transition: color var(--t-fast), border-color var(--t-fast);
    width: 100%;
  }
  .card-acquire:hover {
    color: var(--src-color, var(--accent));
    border-top-color: var(--src-color, var(--accent));
  }
  .card-acquire .arrow {
    font-family: var(--serif); font-size: 14px;
    transition: transform var(--t-fast);
  }
  .card-acquire:hover .arrow { transform: translateX(4px); }

  /* print finish selector */
  .card-finish {
    display: flex; flex-wrap: wrap; gap: var(--s1);
    margin-bottom: var(--s3);
  }
  .finish-pill {
    font-family: var(--sans); font-weight: 500;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-mute);
    border: 5px solid var(--ring-soft);
    padding: 3px 8px; cursor: pointer; background: none;
    transition: color var(--t-fast), border-color var(--t-fast), background var(--t-fast);
  }
  .finish-pill:hover { color: var(--src-color, var(--accent)); border-color: var(--src-color, var(--accent)); }
  .finish-pill.selected { color: var(--bg); background: var(--src-color, var(--accent)); border-color: var(--src-color, var(--accent)); }
  /* paste Shopify embed <div> inside .card-frame.
     delete .card-plaque + .card-number when real product art goes in. */

  /* category row — colored dot + label in venture color */
  .card-cat {
    display:flex; align-items:center; gap:var(--s2);
    padding:var(--s4) 0 var(--s2);
  }
  .cat-dot {
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
    background:var(--src-color, var(--accent));
  }
  .cat-label {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; text-transform:uppercase;
    /* color set inline by JS in venture color */
  }

  .card-meta {
    display:flex; justify-content:space-between; align-items:baseline;
    padding-bottom:var(--s3); gap:var(--s4);
  }
  .card-name {
    font-family:var(--sans); font-weight:700;
    font-size:14px; letter-spacing:0.02em;
    color:var(--text); text-transform:uppercase;
  }
  .card-price {
    font-family:var(--serif); font-size:13px;
    letter-spacing:0.04em; color:var(--text-mute);
    white-space:nowrap;
  }

  /* add-to-cart: hover uses venture color */
  .card-add {
    display:flex; align-items:center; justify-content:space-between;
    padding:var(--s3) 0;
    border-top:5px solid var(--ring-faint);
    font-family:var(--sans); font-weight:500;
    font-size:11px; letter-spacing:0.18em;
    color:var(--text-mute); text-transform:uppercase;
    transition:color var(--t-fast), border-color var(--t-fast);
    width:100%;
  }
  .card-add:hover {
    color:var(--src-color, var(--accent));
    border-top-color:var(--src-color, var(--accent));
  }
  .card-add .arrow {
    font-family:var(--serif); font-size:14px;
    transition:transform var(--t-fast);
  }
  .card-add:hover .arrow { transform:translateX(4px); }

  /* ============================================================
     FOOTER
  ============================================================ */
  footer.bottom {
    position:relative; z-index:2;
    padding:var(--s7) var(--s6);
    border-top:5px solid var(--ring-faint);
    display:flex; justify-content:space-between; align-items:center;
  }
  footer.bottom p, footer.bottom a {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; color:var(--text-dim); text-transform:uppercase;
  }
  footer.bottom a { color:var(--text-mute); transition:color var(--t-fast); }
  footer.bottom a:hover { color:var(--accent); }

  /* ============================================================
     CART DRAWER
  ============================================================ */
  .cart-overlay {
    position:fixed; inset:0; z-index:90;
    background:rgba(0,0,0,0.6); opacity:0; pointer-events:none;
    transition:opacity var(--t-med);
  }
  .cart-overlay.open { opacity:1; pointer-events:auto; }
  .cart-drawer {
    position:fixed; top:0; right:0; bottom:0;
    width:min(440px,100vw); z-index:100;
    background:var(--bg-drawer);
    border-left:5px solid var(--ring-soft);
    display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform var(--t-med);
  }
  .cart-drawer.open { transform:translateX(0); }

  .drawer-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:var(--s5); border-bottom:5px solid var(--ring-faint);
  }
  .drawer-header .title {
    font-family:var(--sans); font-weight:900;
    font-size:14px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--accent);
  }
  .drawer-close {
    font-family:var(--sans); font-weight:300; font-size:28px; line-height:1;
    color:var(--text-mute); padding:var(--s1) var(--s3);
    transition:color var(--t-fast);
  }
  .drawer-close:hover { color:var(--accent); }

  .drawer-items { flex:1; overflow-y:auto; padding:var(--s4) var(--s5); }
  .drawer-empty {
    padding:var(--s7) 0; text-align:center;
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.22em; color:var(--text-dim); text-transform:uppercase;
  }

  .drawer-item {
    display:grid; grid-template-columns:56px 1fr auto;
    gap:var(--s4); padding:var(--s4) 0;
    align-items:flex-start;
  }
  .drawer-item-thumb {
    width:56px; height:70px;
    background:var(--bg-raised);
    border:5px solid var(--ring-soft);
    font-family:var(--serif); font-size:13px;
    color:var(--text-ghost);
    display:flex; align-items:center; justify-content:center;
  }
  .drawer-item-info { display:flex; flex-direction:column; gap:var(--s1); }
  .drawer-item-name {
    font-family:var(--sans); font-weight:700; font-size:12px;
    letter-spacing:0.04em; text-transform:uppercase; color:var(--text);
  }
  /* category tag in drawer: inline dot + label in venture color */
  .drawer-item-cat {
    display:flex; align-items:center; gap:var(--s1);
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase;
  }
  .drawer-cat-dot {
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
  }
  .drawer-item-variant {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-dim); margin-top:1px;
  }
  .drawer-item-qty {
    display:flex; align-items:center; gap:var(--s2); margin-top:var(--s2);
  }
  .qty-btn {
    width:20px; height:20px;
    border:5px solid var(--ring-soft);
    font-family:var(--sans); font-size:12px; color:var(--text-mute);
    display:flex; align-items:center; justify-content:center;
    transition:border-color var(--t-fast), color var(--t-fast);
  }
  .qty-btn:hover { border-color:var(--accent); color:var(--accent); }
  .qty-num {
    font-family:var(--sans); font-size:12px;
    color:var(--text); min-width:16px; text-align:center;
  }
  .drawer-item-right {
    display:flex; flex-direction:column; align-items:flex-end; gap:var(--s2);
  }
  .drawer-item-price { font-family:var(--serif); font-size:12px; color:var(--text); }
  .drawer-item-remove {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.18em; color:var(--text-dim); text-transform:uppercase;
    transition:color var(--t-fast);
  }
  .drawer-item-remove:hover { color:var(--accent); }

  .drawer-footer { padding:var(--s5); border-top:5px solid var(--ring-soft); }
  .subtotal {
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:var(--s5);
  }
  .subtotal-label {
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.22em; color:var(--text-mute); text-transform:uppercase;
  }
  .subtotal-val {
    font-family:var(--sans); font-weight:700;
    font-size:20px; color:var(--accent); letter-spacing:-0.02em;
  }
  .checkout-btn {
    display:block; width:100%; padding:var(--s4);
    border:5px solid var(--accent); background:var(--accent);
    color:var(--bg);
    font-family:var(--sans); font-weight:700; font-size:12px;
    letter-spacing:0.2em; text-transform:uppercase;
    transition:opacity var(--t-fast);
  }
  .checkout-btn:hover { opacity:0.85; }
  .checkout-btn:disabled {
    background:transparent; color:var(--text-dim);
    border-color:var(--ring-soft); cursor:not-allowed; opacity:1;
  }
  .drawer-note {
    margin-top:var(--s3);
    font-family:var(--serif); font-size:9px;
    letter-spacing:0.24em; color:var(--text-dim);
    text-transform:uppercase; text-align:center;
  }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width:1024px) {
    .grid { grid-template-columns:repeat(2,1fr); gap:var(--s6); }
    main { padding:var(--s7) var(--s5) var(--s6); }
  }
  @media (max-width:640px) {
    header.top { padding:var(--s4) var(--s5); }
    main { padding:var(--s6) var(--s5); }
    .intro { flex-direction:column; align-items:flex-start; gap:var(--s4); margin-bottom:var(--s7); }
    .intro p { text-align:left; padding-bottom:0; max-width:none; }
    .filters { gap:var(--s4); }
    .grid { grid-template-columns:1fr; gap:var(--s6); }
    footer.bottom { flex-direction:column; gap:var(--s3); align-items:flex-start; padding:var(--s6) var(--s5); }
  }
</style>
</head>
<body data-venture="merch">

  <div class="grain"></div>

  <!-- HEADER -->
  <header class="top" style="justify-content:flex-end;">
    <button class="cart-toggle" id="cartToggle" aria-label="open cart">
      <span class="cart-label">cart</span>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </header>

  <!-- MAIN -->
  <main>
    <section class="intro">
      <div class="intro-left">
        <p class="intro-above" id="introAbove">everything sellable from the construct</p>
        <h1><span id="merchWord">MERCH</span><span class="merch-dot">.</span></h1>
      </div>
      <!-- REWRITE: default descriptor shown when "all" is selected -->
      <p id="introDesc">everything sellable from the construct</p>
    </section>

    <!-- filter rows — row 1: source venture, row 2: type (only when source active) -->
    <nav class="filters" id="filters" role="tablist">
      <div class="filter-row" id="sourceRow"></div>
      <div class="filter-row" id="typeRow"></div>
    </nav>

    <!-- product grid — rendered by JS -->
    <section class="grid" id="productGrid"></section>
  </main>

  <!-- FOOTER -->
  <footer class="bottom">
    <p>&copy; the six.well construct</p>
    <a href="/">return to construct</a>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="drawer-header">
      <span class="title">cart</span>
      <button class="drawer-close" id="drawerClose" aria-label="close cart">×</button>
    </div>
    <div class="drawer-items" id="drawerItems">
      <p class="drawer-empty">cart is empty</p>
    </div>
    <div class="drawer-footer">
      <div class="subtotal">
        <span class="subtotal-label">subtotal</span>
        <span class="subtotal-val" id="subtotal">$0</span>
      </div>
      <!-- CHECKOUT INTEGRATION POINT
           replace click handler with Shopify SDK checkout.create()
           or hosted-checkout redirect built from cart line items -->
      <button class="checkout-btn" id="checkoutBtn" disabled>proceed to checkout</button>
      <p class="drawer-note">shipping &amp; taxes calculated at checkout</p>
    </div>
  </aside>

  <script>
  /* ============================================================
     SOURCE VENTURES
     ============================================================
     Each entry defines a source venture that feeds products
     into MERCH. To add a new source (e.g. tattooing flash):
       1. Add an entry here
       2. Add products below with matching key
       A filter chip auto-generates from this list.
     
     key:    used to match products (.category field)
     label:  displayed in filter chip and on product cards
     color:  source venture's brand color (from landing system)
     origin: where this comes from conceptually
  ============================================================ */
  const SOURCES = {
    "six.well": {
      label:  "six.well clothing",
      color:  "#F7A226",
      origin: "the construct",
      /* REWRITE — short, uppercase-friendly, your voice */
      statement: "garments from the construct's own hand"
    },
    "thoughtpuppet": {
      label:  "thoughtpuppet",
      color:  "#0581C1",
      origin: "art",
      /* REWRITE — short, uppercase-friendly, your voice */
      statement: "objects that carry the paintings outward"
    },
    "art.pill": {
      label:  "art.pill Tattoo Supply",
      color:  "#8F231D",
      origin: "tattooing",
      /* REWRITE — short, uppercase-friendly, your voice */
      statement: "materials behind the marks"
    }
  };

  /* ============================================================
     PLACEHOLDER PRODUCT DATA
     ============================================================
     Replace with real Shopify product data when wiring up.
     category key must match a key in SOURCES above.
     
     SHOPIFY: each product will get a `shopifyId` field and the
     card-frame will hold a Buy Button embed <div>.
  ============================================================ */
  const PRODUCTS = [
    /* ── SIX.WELL CLOTHING ── */
    /* url field: fill in when product page is built */
    { id:"01", name:"HEAVY TEE",   price:65,  category:"six.well", type:"apparel",
      url:"#",
      sizes:["XS","S","M","L","XL","XXL"],
      colors:[{name:"black",hex:"#1a1a1a"},{name:"slate",hex:"#4a4a5a"},{name:"bone",hex:"#e8e4d8"}] },
    { id:"02", name:"RAW HOODIE",  price:145, category:"six.well", type:"apparel",
      url:"#",
      sizes:["XS","S","M","L","XL","XXL"],
      colors:[{name:"black",hex:"#1a1a1a"},{name:"ash",hex:"#6b6b6b"}] },
    { id:"03", name:"CORE CAP",    price:45,  category:"six.well", type:"apparel",
      url:"#",
      sizes:["S/M","L/XL"],
      colors:[{name:"black",hex:"#1a1a1a"},{name:"bone",hex:"#e8e4d8"}] },
    { id:"04", name:"WORK SHIRT",  price:110, category:"six.well", type:"apparel",
      url:"#",
      sizes:["XS","S","M","L","XL","XXL"],
      colors:[{name:"black",hex:"#1a1a1a"},{name:"ecru",hex:"#c8c0a8"}] },

    /* ── THOUGHTPUPPET ── */

    /* apparel artifact */
    { id:"05", name:"MARBLES HOODIE", price:130, category:"thoughtpuppet", type:"apparel",
      url:"lostmarbles-hoodie.html",  /* fixed from marbles-hoodie.html */
      edition:30,
      sizes:["XS","S","M","L","XL","XXL"],
      colors:[{name:"marbles",hex:"#2a2a2a"}] },

    /* prints */
    { id:"06", name:"MARBLES. PRINT", price:85, category:"thoughtpuppet", type:"print",
      url:"marbles-print.html",
      edition:50,
      sizes:["8×10","11×14","18×24"],
      finish:["matte","archival gloss"],
      origin:"AM I LOSING MY MARBLES OR HIDING THEM?" },
    { id:"07", name:"ARTIFACT PRINT 002", price:75, category:"thoughtpuppet", type:"print",
      url:"#",  /* fill in when page is built */
      sizes:["8×10","11×14"],
      finish:["matte"],
      origin:"painting title here" },

    /* original paintings */
    { id:"08", name:"AM I LOSING MY MARBLES OR HIDING THEM?",
      price:null, category:"thoughtpuppet", type:"painting",
      url:"am-i-losing-my-marbles.html",
      medium:"acrylic on canvas", dimensions:"36 × 48 in", year:"2023" },
    { id:"09", name:"PAINTING 002",
      price:2400, category:"thoughtpuppet", type:"painting",
      url:"#",  /* fill in when page is built */
      medium:"acrylic on wood panel", dimensions:"24 × 24 in", year:"2024" },

    /* ── ART.PILL TATTOO SUPPLY ── */
    { id:"10", name:"HAND POKE KIT",  price:55, category:"art.pill", type:"supply", url:"#" },
    { id:"11", name:"TRANSFER PAPER", price:18, category:"art.pill", type:"supply", url:"#" },
    { id:"12", name:"GRIP WRAP SET",  price:22, category:"art.pill", type:"supply", url:"#" }
  ];

  /* ============================================================
     PRODUCT TYPES
     ============================================================
     Drives the second filter row. Labels are display strings.
     Keys must match the `type` field on each product.
     Add new types here as needed (e.g. "sticker", "toy").
     Color is always amber — type filters are cross-venture.
  ============================================================ */
  const TYPES = {
    "apparel":  { label: "apparel" },
    "print":    { label: "prints" },
    "painting": { label: "paintings" },
    "other":    { label: "other" }   /* placeholder for toys, stickers, etc. */
    /* "supply" intentionally excluded — art.pill supply products
       don't need their own type filter chip */
  };

  /* ============================================================
     STATE
  ============================================================ */
  let cart            = [];
  let activeFilter    = "all";   /* source venture filter */
  let activeTypeFilter = "all";  /* product type filter */

  /* DOM refs */
  const sourceRowEl  = document.getElementById("sourceRow");
  const typeRowEl    = document.getElementById("typeRow");
  const grid         = document.getElementById("productGrid");
  const introDesc    = document.getElementById("introDesc");
  const introAbove   = document.getElementById("introAbove");
  const drawer       = document.getElementById("cartDrawer");
  const overlay      = document.getElementById("cartOverlay");
  const drawerItems  = document.getElementById("drawerItems");
  const cartCount    = document.getElementById("cartCount");
  const subtotalEl   = document.getElementById("subtotal");
  const checkoutBtn  = document.getElementById("checkoutBtn");

  /* ============================================================
     RENDER: SOURCE FILTER CHIPS (row 1)
     "all" chip first (amber), then one per source venture.
     active chip gets --src-color set to its venture color.
  ============================================================ */
  /* ============================================================
     CHIP FACTORY — copied from art/index.html
     Builds a button with .chip class, chip-label span, chip-count.
     --src-color set inline to drive underline + dot color.
  ============================================================ */
  function makeChip(label, count, isActive, srcColor) {
    const btn = document.createElement("button");
    btn.className = "chip" + (isActive ? " active" : "");
    btn.style.setProperty("--src-color", srcColor || "var(--accent)");
    const countHtml = count !== null && count !== undefined
      ? `<span class="chip-count">${count}</span>`
      : "";
    btn.innerHTML = `<span class="chip-label">${label}</span>${countHtml}`;
    return btn;
  }

  function renderFilters() {
    sourceRowEl.innerHTML = "";

    const allBtn = makeChip("all", PRODUCTS.length, activeFilter === "all", "var(--accent)");
    allBtn.addEventListener("click", () => setFilter("all"));
    sourceRowEl.appendChild(allBtn);

    Object.entries(SOURCES).forEach(([key, src]) => {
      const count = PRODUCTS.filter(p => p.category === key).length;
      const btn = makeChip(src.label, count, activeFilter === key, src.color);
      btn.addEventListener("click", () => setFilter(key));
      sourceRowEl.appendChild(btn);
    });
  }

  function renderTypeFilters() {
    typeRowEl.innerHTML = "";

    if (activeFilter === "all") return;

    const sourceFiltered = PRODUCTS.filter(p => p.category === activeFilter);

    const distinctTypes = [...new Set(sourceFiltered.map(p => p.type))];
    if (distinctTypes.length <= 1) return;

    const allBtn = makeChip("all", sourceFiltered.length, activeTypeFilter === "all", "var(--accent)");
    allBtn.addEventListener("click", () => setTypeFilter("all"));
    typeRowEl.appendChild(allBtn);

    Object.entries(TYPES).forEach(([key, t]) => {
      const count = sourceFiltered.filter(p => p.type === key).length;
      if (count === 0) return;
      const btn = makeChip(t.label, count, activeTypeFilter === key, "var(--accent)");
      btn.addEventListener("click", () => setTypeFilter(key));
      typeRowEl.appendChild(btn);
    });
  }

  /* default intro descriptor */
  const DEFAULT_DESC = "everything sellable from the construct";

  function setFilter(key) {
    activeFilter = key;
    activeTypeFilter = "all";

    const titleColor = key === "all" ? "#F7A226" : SOURCES[key].color;
    document.documentElement.style.setProperty("--title-color", titleColor);

    if (key === "all") {
      introAbove.classList.remove("visible");
    } else {
      introAbove.classList.add("visible");
    }

    introDesc.style.opacity = "0";
    setTimeout(() => {
      if (key === "all") {
        introDesc.textContent = DEFAULT_DESC;
        introDesc.style.color = "";
      } else {
        const src = SOURCES[key];
        introDesc.textContent = src.statement;
        introDesc.style.color = src.color;
      }
      introDesc.style.opacity = "1";
    }, 200);

    sourceRowEl.innerHTML = "";
    renderFilters();
    renderTypeFilters();
    renderGrid();
  }

  /* ============================================================
     SET TYPE FILTER (row 2)
     Only updates type, preserves source filter.
  ============================================================ */
  function setTypeFilter(key) {
    activeTypeFilter = key;
    renderTypeFilters(); /* re-render to update active state */
    renderGrid();
  }

  /* ============================================================
     RENDER: PRODUCT GRID
     each card gets --src-color = its venture color, inline.
     this drives hover border, cat dot color, add-btn hover.
  ============================================================ */
  /* per-card selection state — keyed by product id */
  const selections = {}; /* { [productId]: { size: null, color: null } } */

  function renderGrid() {
    /* apply source filter first, then type filter on top */
    let visible = activeFilter === "all"
      ? PRODUCTS
      : PRODUCTS.filter(p => p.category === activeFilter);

    if (activeTypeFilter !== "all") {
      visible = visible.filter(p => p.type === activeTypeFilter);
    }

    grid.innerHTML = visible.map(p => {
      const src = SOURCES[p.category];
      const sel = selections[p.id] || { size: null, color: null, finish: null };
      const type = p.type || "apparel";

      /* image frame — link if product has its own page */
      const frameHtml = p.url
        ? `<a class="card-frame" href="${p.url}" aria-label="view ${p.name}">
            <span class="card-plaque">N&deg; ${p.id}</span>
            <span class="card-number">${p.id}</span>
            ${p.edition ? `<span class="card-edition">ed. / ${p.edition}</span>` : ""}
           </a>`
        : `<div class="card-frame">
            <span class="card-plaque">N&deg; ${p.id}</span>
            <span class="card-number">${p.id}</span>
            ${p.edition ? `<span class="card-edition">ed. / ${p.edition}</span>` : ""}
           </div>`;

      /* price display — null = price on request */
      const priceHtml = p.price !== null && p.price !== undefined
        ? `$${p.price}`
        : `<span style="font-style:italic;font-size:11px">price on request</span>`;

      /* type-specific selectors + CTA */
      let selectorsHtml = "";
      let ctaHtml = "";

      if (type === "painting") {
        /* paintings: show medium + dimensions, acquire CTA */
        selectorsHtml = `
          <p class="card-dims">${p.medium}${p.dimensions ? ` &middot; ${p.dimensions}` : ""}${p.year ? ` &middot; ${p.year}` : ""}</p>
        `;
        ctaHtml = `
          <a class="card-acquire" href="/art/acquisitioninquiry">
            <span>inquire to acquire</span>
            <span class="arrow">&rarr;</span>
          </a>
        `;
      } else if (type === "print") {
        /* prints: size pills + optional finish pills, add to cart */
        const printSizes = p.sizes ? `
          <div class="card-sizes" id="sizes-${p.id}">
            ${p.sizes.map(s => `
              <button class="size-pill${sel.size === s ? ' selected' : ''}"
                      data-size="${s}" data-pid="${p.id}">${s}</button>
            `).join("")}
          </div>
          <p class="size-required" id="req-${p.id}">select a size</p>
        ` : "";
        const printFinish = p.finish && p.finish.length > 1 ? `
          <div class="card-finish" id="finish-${p.id}">
            ${p.finish.map(f => `
              <button class="finish-pill${sel.finish === f ? ' selected' : ''}"
                      data-finish="${f}" data-pid="${p.id}">${f}</button>
            `).join("")}
          </div>
        ` : "";
        selectorsHtml = printSizes + printFinish;
        ctaHtml = `
          <button class="card-add" data-add="${p.id}">
            <span>add to cart</span>
            <span class="arrow">&rarr;</span>
          </button>
        `;
      } else {
        /* apparel / supply: color swatches + size pills, add to cart */
        const colorsHtml = p.colors ? `
          <div class="card-colors" id="colors-${p.id}">
            ${p.colors.map(c => `
              <button class="color-swatch${sel.color === c.name ? ' selected' : ''}"
                      style="background:${c.hex}"
                      data-color="${c.name}" data-pid="${p.id}"
                      title="${c.name}"></button>
            `).join("")}
            <span class="color-label" id="clabel-${p.id}">${sel.color || ''}</span>
          </div>
        ` : "";
        const sizesHtml = p.sizes ? `
          <div class="card-sizes" id="sizes-${p.id}">
            ${p.sizes.map(s => `
              <button class="size-pill${sel.size === s ? ' selected' : ''}"
                      data-size="${s}" data-pid="${p.id}">${s}</button>
            `).join("")}
          </div>
          <p class="size-required" id="req-${p.id}">select a size</p>
        ` : "";
        selectorsHtml = colorsHtml + sizesHtml;
        ctaHtml = `
          <button class="card-add" data-add="${p.id}">
            <span>add to cart</span>
            <span class="arrow">&rarr;</span>
          </button>
        `;
      }

      return `
        <article class="card"
                 style="--src-color:${src.color}"
                 data-id="${p.id}"
                 data-category="${p.category}"
                 data-type="${type}">

          ${frameHtml}

          <div class="card-cat">
            <span class="cat-dot"></span>
            <span class="cat-label" style="color:${src.color}; opacity:0.7">${src.label}</span>
          </div>

          <div class="card-meta">
            <h3 class="card-name">
              ${p.url ? `<a href="${p.url}" style="color:inherit">${p.name}</a>` : p.name}
            </h3>
            <span class="card-price">${priceHtml}</span>
          </div>

          ${selectorsHtml}
          ${ctaHtml}

        </article>
      `;
    }).join("");

    /* wire size pill clicks */
    grid.querySelectorAll(".size-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        const pid  = btn.dataset.pid;
        const size = btn.dataset.size;
        if (!selections[pid]) selections[pid] = { size: null, color: null, finish: null };
        selections[pid].size = size;
        document.querySelectorAll(`#sizes-${pid} .size-pill`).forEach(b => {
          b.classList.toggle("selected", b.dataset.size === size);
        });
        const req = document.getElementById(`req-${pid}`);
        if (req) req.classList.remove("visible");
      });
    });

    /* wire finish pill clicks */
    grid.querySelectorAll(".finish-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        const pid    = btn.dataset.pid;
        const finish = btn.dataset.finish;
        if (!selections[pid]) selections[pid] = { size: null, color: null, finish: null };
        selections[pid].finish = finish;
        document.querySelectorAll(`#finish-${pid} .finish-pill`).forEach(b => {
          b.classList.toggle("selected", b.dataset.finish === finish);
        });
      });
    });

    /* wire color swatch clicks */
    grid.querySelectorAll(".color-swatch").forEach(btn => {
      btn.addEventListener("click", () => {
        const pid   = btn.dataset.pid;
        const color = btn.dataset.color;
        if (!selections[pid]) selections[pid] = { size: null, color: null, finish: null };
        if (selections[pid].color === color) {
          selections[pid].color = null;
          btn.classList.remove("selected");
          const lbl = document.getElementById(`clabel-${pid}`);
          if (lbl) lbl.textContent = "";
        } else {
          selections[pid].color = color;
          document.querySelectorAll(`#colors-${pid} .color-swatch`).forEach(b => {
            b.classList.toggle("selected", b.dataset.color === color);
          });
          const lbl = document.getElementById(`clabel-${pid}`);
          if (lbl) lbl.textContent = color;
        }
      });
    });

    /* wire add-to-cart */
    grid.querySelectorAll("[data-add]").forEach(btn => {
      btn.addEventListener("click", () => addToCart(btn.dataset.add));
    });
  }

  /* ============================================================
     CART OPERATIONS
  ============================================================ */
  function addToCart(productId) {
    const p   = PRODUCTS.find(x => x.id === productId);
    const sel = selections[productId] || { size: null, color: null, finish: null };

    /* block add if product has sizes but none selected */
    if (p.sizes && !sel.size) {
      const req = document.getElementById(`req-${productId}`);
      if (req) {
        req.classList.add("visible");
        const sizesEl = document.getElementById(`sizes-${productId}`);
        if (sizesEl) {
          sizesEl.style.opacity = "0.4";
          setTimeout(() => { sizesEl.style.opacity = "1"; }, 300);
        }
      }
      return;
    }

    const key = `${productId}|${sel.size || ''}|${sel.color || ''}|${sel.finish || ''}`;
    const existing = cart.find(i => i.key === key);
    if (existing) existing.qty += 1;
    else cart.push({ key, productId, size: sel.size, color: sel.color, finish: sel.finish, qty: 1 });
    renderCart();
    openDrawer();
    pulseCount();
  }

  function removeFromCart(key) {
    cart = cart.filter(i => i.key !== key);
    renderCart();
  }

  function updateQty(key, delta) {
    const item = cart.find(i => i.key === key);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeFromCart(key);
    else renderCart();
  }

  /* ============================================================
     RENDER: CART DRAWER
     category tag shows colored dot in venture color
  ============================================================ */
  function renderCart() {
    const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
    cartCount.textContent = totalQty;

    if (cart.length === 0) {
      drawerItems.innerHTML = `<p class="drawer-empty">cart is empty</p>`;
      subtotalEl.textContent = "$0";
      checkoutBtn.disabled = true;
      return;
    }
    checkoutBtn.disabled = false;

    drawerItems.innerHTML = cart.map(item => {
      const p         = PRODUCTS.find(x => x.id === item.productId);
      const src       = SOURCES[p.category];
      const lineTotal = p.price * item.qty;
      const variant = [item.size, item.color, item.finish].filter(Boolean).join(" · ");
      return `
        <div class="drawer-item">
          <div class="drawer-item-thumb">${p.id}</div>
          <div class="drawer-item-info">
            <span class="drawer-item-name">${p.name}</span>
            <span class="drawer-item-cat">
              <span class="drawer-cat-dot" style="background:${src.color}"></span>
              <span style="color:${src.color}; opacity:0.75">${src.label}</span>
            </span>
            ${variant ? `<span class="drawer-item-variant">${variant}</span>` : ""}
            <div class="drawer-item-qty">
              <button class="qty-btn" data-minus="${item.key}" aria-label="decrease">&minus;</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" data-plus="${item.key}" aria-label="increase">+</button>
            </div>
          </div>
          <div class="drawer-item-right">
            <span class="drawer-item-price">$${lineTotal}</span>
            <button class="drawer-item-remove" data-remove="${item.key}">remove</button>
          </div>
        </div>
      `;
    }).join("");

    /* wire qty + remove */
    drawerItems.querySelectorAll("[data-plus]").forEach(b =>
      b.addEventListener("click", () => updateQty(b.dataset.plus, +1)));
    drawerItems.querySelectorAll("[data-minus]").forEach(b =>
      b.addEventListener("click", () => updateQty(b.dataset.minus, -1)));
    drawerItems.querySelectorAll("[data-remove]").forEach(b =>
      b.addEventListener("click", () => removeFromCart(b.dataset.remove)));

    const total = cart.reduce((sum, item) => {
      const p = PRODUCTS.find(x => x.id === item.productId);
      return sum + (p.price * item.qty);
    }, 0);
    subtotalEl.textContent = "$" + total;
  }

  function pulseCount() {
    cartCount.classList.remove("pulse");
    void cartCount.offsetWidth;
    cartCount.classList.add("pulse");
  }

  /* ============================================================
     DRAWER OPEN / CLOSE
  ============================================================ */
  function openDrawer() {
    drawer.classList.add("open"); overlay.classList.add("open");
    drawer.setAttribute("aria-hidden","false");
  }
  function closeDrawer() {
    drawer.classList.remove("open"); overlay.classList.remove("open");
    drawer.setAttribute("aria-hidden","true");
  }
  document.getElementById("cartToggle").addEventListener("click", openDrawer);
  document.getElementById("drawerClose").addEventListener("click", closeDrawer);
  overlay.addEventListener("click", closeDrawer);
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

  /* ============================================================
     CHECKOUT (placeholder)
     replace with Shopify hosted-checkout redirect when ready
  ============================================================ */
  checkoutBtn.addEventListener("click", () => {
    console.log("CHECKOUT — cart:", cart);
    alert("Shopify checkout integration plugs in here.\n\n" +
      cart.map(i => {
        const p = PRODUCTS.find(x => x.id === i.productId);
        return `${p.name} \u00d7 ${i.qty} \u2014 $${p.price * i.qty}`;
      }).join("\n")
    );

  /* center breadcrumb over "MERCH" word only (not the dot).
     resets marginLeft before measuring so previous offset doesn't skew it.
     uses getBoundingClientRect for accurate cross-context positioning. */
  function syncBreadcrumb() {
    const above = document.getElementById("introAbove");
    if (above) above.style.marginLeft = "10px";
  }
  document.fonts.ready.then(() => { syncBreadcrumb(); });
  window.addEventListener("resize", syncBreadcrumb);

  /* read ?filter= URL param on load — lets sub-nodes on the landing
     page deep-link directly into a filtered view.
     e.g. merch/index.html?filter=six.well activates six.well clothing.
     if no param or unrecognised key, defaults to "all". */
  const urlParams = new URLSearchParams(window.location.search);
  const initFilter = urlParams.get("filter");
  if (initFilter && SOURCES[initFilter]) {
    setFilter(initFilter);
  }
