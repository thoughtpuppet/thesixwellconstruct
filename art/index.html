<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>art · the six.well construct</title>

<!--
  ============================================================
  the six.well construct / art  —  v1
  ============================================================

  ARCHITECTURE:
    ART is the painting vault for the construct.
    Works are organized by type (painting / wood) and medium.
    Clicking any card opens an expand-in-place overlay showing:
      title · year · medium · fragment · statement link

    Venture color: #0581C1 (thoughtpuppet blue)
    Text: amber-keyed, matching construct identity

  TYPE:
    Inter 900 (display, UI) — matches landing wordmark
    Times New Roman (descriptors, metadata, fragments)

  SECTIONS:
    Paintings  — 8 placeholders (P001–P008)
    Wood works — 1 section placeholder (W001)

  REWRITE MARKERS:
    intro descriptor — one short line in your voice
    fragment — pull quote from painting's statement
    statement — link to individual work page
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/transitions.css">

<style>
  /* ============================================================
     DESIGN TOKENS
  ============================================================ */
  :root {
    --bg:        #0e0e0e;
    --bg-raised: #111111;

    --accent:    #0581C1;            /* thoughtpuppet blue — ART node */

    --ring:      rgba(5,129,193,0.6);
    --ring-soft: rgba(5,129,193,0.28);
    --ring-faint:rgba(5,129,193,0.12);

    /* text keyed to amber at descending opacity — construct identity */
    --text:      #FCB867;
    --text-mute: rgba(252,184,103,0.55);
    --text-dim:  rgba(252,184,103,0.30);
    --text-ghost:rgba(252,184,103,0.09);

    --s1:4px; --s2:8px; --s3:12px; --s4:16px;
    --s5:24px; --s6:40px; --s7:64px; --s8:96px;

    --sans: 'Inter','Helvetica Neue',Arial,sans-serif;
    --serif:'Times New Roman',Times,serif;

    --t-fast:0.18s cubic-bezier(0.2,0,0.2,1);
    --t-med: 0.35s cubic-bezier(0.2,0,0.2,1);
    --t-slow:0.55s cubic-bezier(0.2,0,0.2,1);
  }

  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body {
    background:var(--bg); color:var(--text);
    font-family:var(--sans);
    min-height:100vh; overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  a { color:inherit; text-decoration:none; }
  button { background:none; border:none; color:inherit; font:inherit; cursor:pointer; }

  /* ============================================================
     AMBIENT
  ============================================================ */
  .grain {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0.035; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============================================================
     HEADER
  ============================================================ */
  header.top {
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:flex-end;
    padding:var(--s5) var(--s6);
    background:rgba(14,14,14,0.85);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--ring-faint);
  }

  /* ============================================================
     MAIN
  ============================================================ */
  main {
    position:relative; z-index:2;
    max-width:1440px; margin:0 auto;
    padding:var(--s8) var(--s6) var(--s7);
  }

  /* ============================================================
     INTRO
  ============================================================ */
  .intro {
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:var(--s6); margin-bottom:var(--s8);
  }
  .intro h1 {
    font-family:var(--sans); font-weight:900;
    font-size:clamp(80px,14vw,220px);
    letter-spacing:-0.05em; line-height:0.88;
    color:var(--accent);
  }
  .intro-desc {
    font-family:var(--serif); font-size:12px;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--text-mute); max-width:260px;
    text-align:right; line-height:1.6;
    padding-bottom:var(--s4);
  }

  /* ============================================================
     FILTER BAR — two rows: type + medium
  ============================================================ */
  .filters-wrap {
    margin-bottom:var(--s6);
    border-bottom:1px solid var(--ring-faint);
  }
  .filter-row {
    display:flex; align-items:center; gap:var(--s5);
    padding-bottom:var(--s4); flex-wrap:wrap;
  }
  .filter-row + .filter-row { padding-bottom:var(--s5); }

  .filter-row-label {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--text-dim); min-width:48px; flex-shrink:0;
  }

  .filter {
    position:relative;
    font-family:var(--sans); font-weight:500;
    font-size:13px; letter-spacing:0.04em;
    text-transform:lowercase; color:var(--text-mute);
    padding:var(--s2) 0;
    transition:color var(--t-fast);
  }
  .filter:hover { color:var(--text); }
  .filter.active { color:var(--text); }
  .filter.active::after {
    content:"";
    position:absolute; left:0; bottom:-1px;
    width:100%; height:1px;
    background:var(--accent);
  }
  .filter.active::before {
    content:"";
    position:absolute; left:-10px; top:50%;
    width:4px; height:4px; border-radius:50%;
    background:var(--accent);
    transform:translateY(-50%);
  }
  .filter-count {
    font-family:var(--serif); font-size:10px;
    color:var(--text-dim); margin-left:2px;
    vertical-align:super;
  }

  /* ============================================================
     VAULT GRID
  ============================================================ */
  .grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:var(--s7) var(--s5);
  }

  /* ============================================================
     PAINTING CARD
  ============================================================ */
  .card {
    display:flex; flex-direction:column;
    cursor:pointer;
  }
  .card:focus-visible { outline:1px solid var(--accent); outline-offset:4px; }

  .card-frame {
    position:relative;
    aspect-ratio:3/4;
    background:var(--bg-raised);
    border:1px solid var(--ring-soft);
    overflow:hidden;
    transition:border-color var(--t-med), transform var(--t-med);
  }
  .card:hover .card-frame {
    border-color:var(--accent);
    transform:translateY(-3px);
  }

  .card-num {
    position:absolute; top:var(--s4); left:var(--s4);
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; color:var(--text-dim);
    text-transform:uppercase;
  }
  .card-ghost {
    position:absolute; top:50%; right:var(--s4);
    transform:translateY(-50%);
    font-family:var(--serif);
    font-size:clamp(56px,7vw,88px); line-height:1;
    color:var(--text-ghost); font-weight:400;
    letter-spacing:-0.02em; user-select:none;
  }
  .card-hint {
    position:absolute; bottom:var(--s4); right:var(--s4);
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-dim);
    opacity:0; transition:opacity var(--t-fast);
  }
  .card:hover .card-hint { opacity:1; }

  .card-meta {
    padding:var(--s3) 0 var(--s1);
  }
  .card-title {
    font-family:var(--sans); font-weight:700;
    font-size:13px; letter-spacing:0.02em;
    color:var(--text); text-transform:uppercase;
    margin-bottom:3px;
  }
  .card-sub {
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.14em; color:var(--text-mute);
    text-transform:uppercase;
  }

  /* ============================================================
     SECTION DIVIDER — wood works
  ============================================================ */
  .section-divider {
    grid-column:1 / -1;
    display:flex; align-items:center; gap:var(--s5);
    padding:var(--s6) 0 var(--s5);
  }
  .section-line {
    flex:1; height:1px; background:var(--ring-faint);
  }
  .section-label {
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.28em; text-transform:uppercase;
    color:var(--text-dim);
  }

  /* ============================================================
     OVERLAY — expand-in-place detail panel
  ============================================================ */
  .overlay-bg {
    position:fixed; inset:0; z-index:80;
    background:rgba(4,4,4,0.9);
    opacity:0; pointer-events:none;
    transition:opacity var(--t-med);
    backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
  }
  .overlay-bg.open { opacity:1; pointer-events:auto; }

  .overlay-panel {
    position:fixed; z-index:90;
    top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.95);
    width:min(760px,94vw);
    max-height:90vh;
    background:var(--bg-raised);
    border:1px solid var(--ring-soft);
    display:grid;
    grid-template-columns:1fr 1fr;
    opacity:0; pointer-events:none;
    transition:opacity var(--t-med), transform var(--t-med);
    overflow:hidden;
  }
  .overlay-panel.open {
    opacity:1; pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
  }

  .overlay-image {
    aspect-ratio:3/4;
    background:var(--bg);
    border-right:1px solid var(--ring-faint);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .overlay-ghost {
    font-family:var(--serif);
    font-size:clamp(72px,10vw,120px); line-height:1;
    color:var(--text-ghost); font-weight:400;
    letter-spacing:-0.02em; user-select:none;
  }

  .overlay-info {
    padding:var(--s5);
    display:flex; flex-direction:column;
    overflow-y:auto;
  }

  .overlay-top {
    display:flex; justify-content:flex-end;
    margin-bottom:var(--s5);
  }
  .overlay-close {
    font-family:var(--sans); font-weight:300;
    font-size:26px; line-height:1;
    color:var(--text-mute);
    padding:var(--s1) var(--s2);
    transition:color var(--t-fast);
  }
  .overlay-close:hover { color:var(--accent); }

  .overlay-meta { flex:1; }

  .overlay-num {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.28em; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:var(--s3);
  }
  .overlay-title {
    font-family:var(--sans); font-weight:900;
    font-size:clamp(20px,3.5vw,34px);
    letter-spacing:-0.03em; line-height:1.05;
    color:var(--accent); margin-bottom:var(--s5);
  }

  .overlay-details {
    display:flex; flex-direction:column; gap:var(--s2);
    margin-bottom:var(--s5);
    padding-bottom:var(--s5);
    border-bottom:1px solid var(--ring-faint);
  }
  .overlay-detail {
    font-family:var(--serif); font-size:11px;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-mute);
  }
  .overlay-detail-key {
    color:var(--text-dim); margin-right:var(--s3);
  }

  .overlay-fragment {
    font-family:var(--serif); font-size:13px;
    line-height:1.75; color:var(--text-mute);
    font-style:italic;
    border-left:2px solid var(--accent);
    padding-left:var(--s4);
    margin-bottom:var(--s6);
    opacity:0.8;
  }

  .overlay-link {
    display:flex; align-items:center; justify-content:space-between;
    padding:var(--s4) 0 0;
    border-top:1px solid var(--ring-faint);
    font-family:var(--sans); font-weight:500;
    font-size:11px; letter-spacing:0.18em;
    color:var(--text-mute); text-transform:uppercase;
    transition:color var(--t-fast), border-top-color var(--t-fast);
    margin-top:auto;
  }
  .overlay-link:hover {
    color:var(--accent);
    border-top-color:var(--accent);
  }
  .overlay-link .arrow {
    font-family:var(--serif); font-size:14px;
    transition:transform var(--t-fast);
  }
  .overlay-link:hover .arrow { transform:translateX(4px); }

  /* ============================================================
     FOOTER
  ============================================================ */
  footer.bottom {
    position:relative; z-index:2;
    padding:var(--s7) var(--s6);
    border-top:1px solid var(--ring-faint);
    display:flex; justify-content:space-between; align-items:center;
  }
  footer.bottom p, footer.bottom a {
    font-family:var(--serif); font-size:10px;
    letter-spacing:0.22em; color:var(--text-dim); text-transform:uppercase;
  }
  footer.bottom a { color:var(--text-mute); transition:color var(--t-fast); }
  footer.bottom a:hover { color:var(--accent); }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width:1200px) {
    .grid { grid-template-columns:repeat(3,1fr); }
  }
  @media (max-width:900px) {
    .overlay-panel { grid-template-columns:1fr; width:min(480px,94vw); }
    .overlay-image {
      aspect-ratio:16/9;
      border-right:none;
      border-bottom:1px solid var(--ring-faint);
    }
  }
  @media (max-width:768px) {
    .grid { grid-template-columns:repeat(2,1fr); gap:var(--s6) var(--s4); }
    main { padding:var(--s7) var(--s5) var(--s6); }
  }
  @media (max-width:640px) {
    header.top { padding:var(--s4) var(--s5); }
    main { padding:var(--s6) var(--s5); }
    .intro { flex-direction:column; align-items:flex-start; gap:var(--s4); margin-bottom:var(--s7); }
    .intro-desc { text-align:left; padding-bottom:0; max-width:none; }
    .filters-wrap { overflow-x:auto; }
    .filter-row { flex-wrap:nowrap; }
    footer.bottom { flex-direction:column; gap:var(--s3); align-items:flex-start; padding:var(--s6) var(--s5); }
  }
</style>
</head>
<body>

  <!-- blink prevention -->
  <script>
  (function(){
    var o=document.createElement('div');
    o.id='construct-fade';
    o.style.cssText='position:fixed;inset:0;background:#0e0e0e;z-index:9999;';
    document.body.appendChild(o);
  })();
  </script>

  <div class="grain"></div>

  <header class="top">
    <!-- construct-corner.js injects wordmark -->
  </header>

  <main>
    <section class="intro">
      <h1>ART.</h1>
      <!-- REWRITE: one line, your voice -->
      <p class="intro-desc">paintings and wood from the thoughtpuppet hand</p>
    </section>

    <nav class="filters-wrap" aria-label="filter works">
      <div class="filter-row" id="typeFilters"></div>
      <div class="filter-row" id="mediumFilters"></div>
    </nav>

    <section class="grid" id="artGrid"></section>
  </main>

  <footer class="bottom">
    <p>&copy; the six.well construct</p>
    <a href="/">return to construct</a>
  </footer>

  <!-- overlay -->
  <div class="overlay-bg" id="overlayBg"></div>
  <div class="overlay-panel" id="overlayPanel"
       role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <div class="overlay-image">
      <span class="overlay-ghost" id="overlayGhost"></span>
    </div>
    <div class="overlay-info">
      <div class="overlay-top">
        <button class="overlay-close" id="overlayClose" aria-label="close detail">&#215;</button>
      </div>
      <div class="overlay-meta">
        <p class="overlay-num"   id="overlayNum"></p>
        <h2 class="overlay-title" id="overlayTitle"></h2>
        <div class="overlay-details" id="overlayDetails"></div>
        <p class="overlay-fragment" id="overlayFragment"></p>
      </div>
      <a class="overlay-link" id="overlayLink" href="#">
        <span>read statement</span>
        <span class="arrow">&rarr;</span>
      </a>
    </div>
  </div>

  <script>
  /* ============================================================
     WORKS DATA
     Replace placeholders with real work data.
     fragment — pull quote / excerpt from statement (your voice)
     statement — path to individual work page, or "#" until built
  ============================================================ */
  const WORKS = [
    /* ── paintings ─────────────────────────────────────────── */
    {
      id:"P001", num:1, type:"painting", medium:"oil", year:"2024",
      title:"UNTITLED I",
      /* REWRITE */
      fragment:"the weight before the brushstroke — held in the wrist",
      statement:"#"
    },
    {
      id:"P002", num:2, type:"painting", medium:"acrylic", year:"2024",
      title:"UNTITLED II",
      fragment:"pigment over pigment, each layer a different hour",
      statement:"#"
    },
    {
      id:"P003", num:3, type:"painting", medium:"oil", year:"2023",
      title:"UNTITLED III",
      fragment:"what the eye reaches for when the painting goes still",
      statement:"#"
    },
    {
      id:"P004", num:4, type:"painting", medium:"gouache", year:"2023",
      title:"UNTITLED IV",
      fragment:"opaque until it isn't — the moment the surface breaks",
      statement:"#"
    },
    {
      id:"P005", num:5, type:"painting", medium:"ink", year:"2024",
      title:"UNTITLED V",
      fragment:"a mark you cannot correct is the only true mark",
      statement:"#"
    },
    {
      id:"P006", num:6, type:"painting", medium:"acrylic", year:"2023",
      title:"UNTITLED VI",
      fragment:"the canvas held more silence than paint by the end",
      statement:"#"
    },
    {
      id:"P007", num:7, type:"painting", medium:"mixed media", year:"2024",
      title:"UNTITLED VII",
      fragment:"two surfaces arguing over the same edge",
      statement:"#"
    },
    {
      id:"P008", num:8, type:"painting", medium:"oil", year:"2024",
      title:"UNTITLED VIII",
      fragment:"slow pigment — the one that outlasts the intention",
      statement:"#"
    },
    /* ── wood works ─────────────────────────────────────────── */
    {
      id:"W001", num:1, type:"wood", medium:"carved wood", year:"2024",
      title:"WOOD WORK I",
      fragment:"grain as argument — the material speaking back",
      statement:"#"
    }
  ];

  /* ============================================================
     FILTER DIMENSIONS
  ============================================================ */
  const TYPES = {
    painting: "paintings",
    wood:     "wood works"
  };

  const MEDIUMS = ["oil","acrylic","gouache","ink","mixed media","carved wood"];

  /* ============================================================
     STATE
  ============================================================ */
  let activeType   = "all";
  let activeMedium = "all";
  let overlayOpen  = false;

  /* DOM */
  const typeFiltersEl   = document.getElementById("typeFilters");
  const mediumFiltersEl = document.getElementById("mediumFilters");
  const grid            = document.getElementById("artGrid");
  const overlayBg       = document.getElementById("overlayBg");
  const overlayPanel    = document.getElementById("overlayPanel");

  /* ============================================================
     FILTER RENDERING
  ============================================================ */
  function renderTypeFilters() {
    typeFiltersEl.innerHTML = "";
    const lbl = document.createElement("span");
    lbl.className = "filter-row-label";
    lbl.textContent = "type";
    typeFiltersEl.appendChild(lbl);

    typeFiltersEl.appendChild(
      makeChip("all works", WORKS.length, activeType === "all", () => setType("all"))
    );
    Object.entries(TYPES).forEach(([key, label]) => {
      const count = WORKS.filter(w => w.type === key).length;
      typeFiltersEl.appendChild(
        makeChip(label, count, activeType === key, () => setType(key))
      );
    });
  }

  function renderMediumFilters() {
    mediumFiltersEl.innerHTML = "";
    const lbl = document.createElement("span");
    lbl.className = "filter-row-label";
    lbl.textContent = "medium";
    mediumFiltersEl.appendChild(lbl);

    const pool = activeType === "all" ? WORKS : WORKS.filter(w => w.type === activeType);
    mediumFiltersEl.appendChild(
      makeChip("all media", pool.length, activeMedium === "all", () => setMedium("all"))
    );
    MEDIUMS.forEach(m => {
      const count = pool.filter(w => w.medium === m).length;
      if (!count) return;
      mediumFiltersEl.appendChild(
        makeChip(m, count, activeMedium === m, () => setMedium(m))
      );
    });
  }

  function makeChip(label, count, active, onClick) {
    const btn = document.createElement("button");
    btn.className = "filter" + (active ? " active" : "");
    btn.innerHTML = `${label}<span class="filter-count">${count}</span>`;
    btn.addEventListener("click", onClick);
    return btn;
  }

  function setType(key) {
    activeType   = key;
    activeMedium = "all";
    renderTypeFilters();
    renderMediumFilters();
    renderGrid();
  }

  function setMedium(key) {
    activeMedium = key;
    renderMediumFilters();
    renderGrid();
  }

  /* ============================================================
     GRID RENDERING
  ============================================================ */
  function renderGrid() {
    let pool = activeType === "all" ? WORKS : WORKS.filter(w => w.type === activeType);
    if (activeMedium !== "all") pool = pool.filter(w => w.medium === activeMedium);

    const paintings = pool.filter(w => w.type === "painting");
    const woods     = pool.filter(w => w.type === "wood");

    let html = paintings.map(cardHTML).join("");

    if (woods.length) {
      html += `
        <div class="section-divider">
          <div class="section-line"></div>
          <span class="section-label">wood works</span>
          <div class="section-line"></div>
        </div>
        ${woods.map(cardHTML).join("")}
      `;
    }

    grid.innerHTML = html;

    grid.querySelectorAll(".card[data-id]").forEach(card => {
      card.addEventListener("click",  () => openOverlay(card.dataset.id));
      card.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openOverlay(card.dataset.id);
        }
      });
    });
  }

  function cardHTML(w) {
    return `
      <article class="card" data-id="${w.id}" tabindex="0"
               role="button" aria-label="view ${w.title}">
        <div class="card-frame">
          <span class="card-num">N&deg;&thinsp;${w.id}</span>
          <span class="card-ghost">${w.num}</span>
          <span class="card-hint">expand</span>
        </div>
        <div class="card-meta">
          <p class="card-title">${w.title}</p>
          <p class="card-sub">${w.year}&nbsp;&middot;&nbsp;${w.medium}</p>
        </div>
      </article>
    `;
  }

  /* ============================================================
     OVERLAY
  ============================================================ */
  function openOverlay(id) {
    const w = WORKS.find(x => x.id === id);
    if (!w) return;

    document.getElementById("overlayGhost").textContent   = w.num;
    document.getElementById("overlayNum").textContent     = `N\u00b0\u2009${w.id}`;
    document.getElementById("overlayTitle").textContent   = w.title;
    document.getElementById("overlayFragment").textContent = `\u201c${w.fragment}\u201d`;
    document.getElementById("overlayDetails").innerHTML   = `
      <p class="overlay-detail">
        <span class="overlay-detail-key">year</span>${w.year}
      </p>
      <p class="overlay-detail">
        <span class="overlay-detail-key">medium</span>${w.medium}
      </p>
      <p class="overlay-detail">
        <span class="overlay-detail-key">type</span>${TYPES[w.type] || w.type}
      </p>
    `;
    const link  = document.getElementById("overlayLink");
    link.href   = w.statement;
    link.style.pointerEvents = w.statement === "#" ? "none" : "";
    link.style.opacity       = w.statement === "#" ? "0.35" : "";

    overlayBg.classList.add("open");
    overlayPanel.classList.add("open");
    overlayOpen = true;
    document.body.style.overflow = "hidden";
    document.getElementById("overlayClose").focus();
  }

  function closeOverlay() {
    overlayBg.classList.remove("open");
    overlayPanel.classList.remove("open");
    overlayOpen = false;
    document.body.style.overflow = "";
  }

  document.getElementById("overlayClose").addEventListener("click", closeOverlay);
  overlayBg.addEventListener("click", closeOverlay);
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && overlayOpen) closeOverlay();
  });

  /* ============================================================
     INIT
  ============================================================ */
  renderTypeFilters();
  renderMediumFilters();
  renderGrid();
  </script>

  <script src="/js/transition.js"></script>
  <script src="/js/construct-corner.js"></script>
</body>
</html>
