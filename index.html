<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; overflow: hidden; font-family: 'Inter','Helvetica Neue',sans-serif; touch-action: none; }
  #stage { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  canvas { position: absolute; inset: 0; }
  #node-labels { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .node-label {
    position: absolute; font-family: 'Inter','Helvetica Neue',sans-serif; font-size: 14px; font-weight: 900; letter-spacing: -0.1em;
    text-transform: uppercase; opacity: 0; transition: opacity 0.3s ease;
    transform: translate(-50%,-50%); pointer-events: none; white-space: nowrap;
  }
  /* Wordmark — top center, always visible */
  #wordmark {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 900;
    font-size: 52px; letter-spacing: -0.05em; color: #FCB867; opacity: 0.82;
    z-index: 10; white-space: nowrap; pointer-events: none; line-height: 1;
  }
  /* Descriptor — appears under wordmark when ring is clicked */
  #wordmark-desc {
    position: absolute; top: 94px; left: 50%; transform: translateX(-50%);
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #FCB867; opacity: 0;
    z-index: 10; white-space: nowrap; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  /* Mobile responsive typography */
  @media (max-width: 600px) {
    #wordmark { font-size: 28px; top: 18px; letter-spacing: -0.04em; }
    #wordmark-desc { top: 56px; font-size: 9px; letter-spacing: 0.12em; }
    .node-label { font-size: 11px; }
    #hint { font-size: 8px !important; }
  }
  @media (max-width: 390px) {
    #wordmark { font-size: 22px; top: 14px; }
  }
  /* Node description layer — Times New Roman italic, appears on hover */
  #node-descs { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .node-desc {
    position: absolute; font-family: 'Times New Roman', Times, serif;
    font-size: 11px; letter-spacing: 0.03em;
    text-transform: lowercase; opacity: 0; transition: opacity 0.25s ease;
    transform: translate(-50%,-50%); pointer-events: none; white-space: nowrap;
  }
  #hint {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #FCB86733; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    font-family: 'Times New Roman', Times, serif;
    z-index: 10; transition: opacity 0.4s ease, color 0.4s ease;
  }
  /* Sub-node labels — Times New Roman, all lowercase, quieter than parent labels */
  #sub-node-labels { position: absolute; inset: 0; pointer-events: none; z-index: 11; }
  .sub-node-label {
    position: absolute;
    font-family: 'Times New Roman', Times, serif;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    opacity: 0;
    transition: opacity 0.25s ease;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="wordmark">the six.well construct</div>
  <div id="wordmark-desc">the creative ecosystem of Saiel Dauhn Solehman</div>
  <div id="node-labels"></div>
  <div id="node-descs"></div>
  <div id="sub-node-labels"></div>
  <div id="hint">HOVER THE CONSTRUCT</div>
</div>

  H = canvas.height = stage.offsetHeight;

  // Scale all distances relative to a 500px reference — caps at 1 on desktop
  scale = Math.min(1, Math.min(W, H) / 500);
}
resize();

let eyeTint1 = null, eyeTint2 = null;
function buildEyeTint(img) {
  const oc = document.createElement('canvas');
  oc.width = img.naturalWidth; oc.height = img.naturalHeight;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(img, 0, 0);
  oc2.globalCompositeOperation = 'multiply';
  oc2.fillStyle = '#FCB867';
  oc2.fillRect(0, 0, oc.width, oc.height);
  return oc;
}
function getBreath(t) { return 0.5 + 0.5 * Math.sin((t / 9000) * Math.PI * 2); }
function drawEyes(t) {
  if (eyesLoaded < 2) return;
  if (!eyeTint1) eyeTint1 = buildEyeTint(eyeImg1);
  if (!eyeTint2) eyeTint2 = buildEyeTint(eyeImg2);
  const breath = getBreath(t);
  const opacityMult = 0.45 + 0.55 * breath;
  const driftFactor = 0.06;
  let idx = 0;
  EYE_RINGS.forEach(ring => {
    const breathDist = ring.dist * scale * (1 + driftFactor * (breath - 0.5));
    for (let i = 0; i < ring.count; i++) {
      const angle = (i / ring.count) * Math.PI * 2;
      const ex = cx + Math.cos(angle) * breathDist;
      const ey = cy + Math.sin(angle) * breathDist;
      const tint = idx % 2 === 0 ? eyeTint1 : eyeTint2;
      const aspect = tint.height / tint.width;
      const iw = ring.w * scale, ih = iw * aspect;
      ctx.save();
      ctx.globalAlpha = ring.alpha * opacityMult;
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(tint, ex - iw/2, ey - ih/2, iw, ih);
      ctx.restore();
      idx++;
    }
  });
}

const EXPAND_SPEED=0.00028,COLLAPSE_SPEED=0.00042;
const DOT_R=0xFC,DOT_G=0xB8,DOT_B=0x67;
let dotStartX=new Array(VENTURES.length).fill(0),dotStartY=new Array(VENTURES.length).fill(0);

const MAX_P=100,SPAWN_INT=180,particles=[];
function spawnP(pre){
  const close=Math.random()<0.4,minD=close?8:80,maxD=close?90:370;
  const p={angle:Math.random()*Math.PI*2,dist:RING_OUTER,targetDist:RING_OUTER+minD+Math.random()*(maxD-minD),orbitSpeed:(Math.random()*0.000035+0.00001)*(Math.random()<0.5?1:-1),driftSpeed:0.003+Math.random()*0.007,size:2+Math.random()*3.8,maxAlpha:0.15+Math.random()*0.38,floatAmpX:2+Math.random()*4,floatAmpY:2+Math.random()*4,floatPX:12000+Math.random()*10000,floatPY:14000+Math.random()*10000,floatOX:Math.random()*Math.PI*2,floatOY:Math.random()*Math.PI*2,fadeInDur:800+Math.random()*600,fadeOutDur:1400+Math.random()*1000,age:0,totalLife:null,reached:false};
  if(pre){const fr=Math.random();p.dist=RING_OUTER+fr*(p.targetDist-RING_OUTER);p.age=fr*(p.fadeInDur+3000);if(p.dist>=p.targetDist){p.reached=true;p.totalLife=p.age+4000+Math.random()*8000;}}
  particles.push(p);
}
for(let i=0;i<MAX_P;i++)spawnP(true);
let spawnTimer=0;
function updateParticles(dt,t){
  spawnTimer+=dt;if(spawnTimer>=SPAWN_INT&&particles.length<MAX_P){spawnP(false);spawnTimer=0;}
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.age+=dt;p.angle+=p.orbitSpeed*dt;
    if(!p.reached){p.dist+=p.driftSpeed*dt;if(p.dist>=p.targetDist){p.dist=p.targetDist;p.reached=true;p.totalLife=p.age+4000+Math.random()*8000;}}
    if(p.reached&&p.age>=p.totalLife){particles.splice(i,1);continue;}
    let alpha;if(!p.reached){alpha=Math.min(p.age/p.fadeInDur,1)*p.maxAlpha;}else{const tl=p.totalLife-p.age;alpha=tl<p.fadeOutDur?(tl/p.fadeOutDur)*p.maxAlpha:p.maxAlpha;}
    const fx=p.floatAmpX*Math.sin((t/p.floatPX)*Math.PI*2+p.floatOX);const fy=p.floatAmpY*Math.sin((t/p.floatPY)*Math.PI*2+p.floatOY);
    ctx.globalAlpha=alpha;ctx.beginPath();ctx.arc(cx+Math.cos(p.angle)*p.dist+fx,cy+Math.sin(p.angle)*p.dist+fy,p.size,0,Math.PI*2);ctx.fillStyle=PARTICLE_COLOR;ctx.fill();
  }ctx.globalAlpha=1;
}

let state='idle',logoHover=false,hoveredNode=-1,expandProgress=0,collapseProgress=0;
let time=0,lastT=null,slowOrbit=0,mouseX=0,mouseY=0;
const nodeHP=new Array(VENTURES.length).fill(0);
const nodeX=new Array(VENTURES.length).fill(0);
const nodeY=new Array(VENTURES.length).fill(0);
let nodePosInit=false;
const collapseStartX=new Array(VENTURES.length).fill(0);
const collapseStartY=new Array(VENTURES.length).fill(0);
let nodeLabelEls=[];
VENTURES.forEach(v=>{const el=document.createElement('div');el.className='node-label';el.textContent=v.name;el.style.color=v.color;nodeLabelsDiv.appendChild(el);nodeLabelEls.push(el);});

function toRad(d){return d*Math.PI/180;}
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeOutSoft(t){return 1-Math.pow(1-t,2);}
function easeInOutSoft(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function easeInOut(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp01(t){return Math.max(0,Math.min(1,t));}
function driftOpenFactor(i,prog){if(prog<ARRIVE_AT[i])return 0;return easeOutSoft(Math.min((prog-ARRIVE_AT[i])/DRIFT_OPEN_DURATION,1));}
function getDrift(i,t,of){const d=DRIFTS[i];return{x:d.ax*of*Math.sin((t/d.px)*Math.PI*2+d.ox),y:d.ay*of*Math.sin((t/d.py)*Math.PI*2+d.oy)};}
function getNodeAnchor(v){const a=toRad(v.angle)+slowOrbit*0.00004;return{x:cx+Math.cos(a)*v.dist*scale,y:cy+Math.sin(a)*v.dist*scale};}
function getRingEdgeForNode(v){const a=toRad(v.angle)+slowOrbit*0.00004;return{x:cx+Math.cos(a)*RING_OUTER*scale,y:cy+Math.sin(a)*RING_OUTER*scale};}
function getDotCurrentPos(i){const d=DOT_POSITIONS[i];const angle=Math.atan2(d[1],d[0])+time*0.003;return{x:cx+Math.cos(angle)*Math.hypot(d[0],d[1]),y:cy+Math.sin(angle)*Math.hypot(d[0],d[1])};}
function getDotTargetPos(i){const d=DOT_POSITIONS[i];const angle=Math.atan2(d[1],d[0])+time*0.003;return{x:cx+Math.cos(angle)*Math.hypot(d[0],d[1]),y:cy+Math.sin(angle)*Math.hypot(d[0],d[1])};}
function isOverCenter(mx,my){return Math.hypot(mx-cx,my-cy)<65*scale;}
function isOverLogo(mx,my){if(state==='expanded'||state==='collapsing')return false;if(expandProgress>0.35)return false;return Math.hypot(mx-cx,my-cy)<RING_OUTER*scale+4;}
function getHoveredNode(mx,my){if(expandProgress<0.8||state==='collapsing')return -1;for(let i=0;i<VENTURES.length;i++)if(Math.hypot(mx-nodeX[i],my-nodeY[i])<30*scale)return i;return -1;}
function triggerCollapse(){
  // Instantly clear any open sub-nodes — parent is about to move
  if(subNodeState!=='idle'){
    subNodeState='idle';activeVentureIdx=-1;
    subNodeLabelEls.forEach(el=>el.style.opacity='0');
    subNodeHP.fill(0);hoveredSubNode=-1;
  }
  VENTURES.forEach((v,i)=>{collapseStartX[i]=nodeX[i];collapseStartY[i]=nodeY[i];});
  collapseProgress=0;state='collapsing';hoveredNode=-1;nodeHP.fill(0);
  hint.style.opacity='0';nodeLabelEls.forEach(el=>el.style.opacity='0');
  nodeDescEls.forEach(el=>el.style.opacity='0');
}

stage.addEventListener('mousemove',e=>{
  const r=stage.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
  const over=isOverLogo(mouseX,mouseY);
  if(over!==logoHover){logoHover=over;if(logoHover&&state==='idle'){state='hover-logo';hint.style.opacity='0';}else if(!logoHover&&state==='hover-logo'){state='idle';hint.style.opacity='1';}}

  // Sub-node hover takes priority — check before venture nodes
  hoveredSubNode=getHoveredSubNode(mouseX,mouseY);

  if(state==='expanded'&&isOverCenter(mouseX,mouseY)){
    stage.style.cursor='pointer';hoveredNode=-1;
  }else if(hoveredSubNode>=0){
    // Over a sub-node: pointer cursor, update hint with sub-page name
    stage.style.cursor='pointer';hoveredNode=-1;
    if(activeVentureIdx>=0){
      hint.textContent='→ '+SUB_NODE_DATA[VENTURES[activeVentureIdx].name][hoveredSubNode].name;
      hint.style.color=VENTURES[activeVentureIdx].color;
      hint.style.opacity='0.55';
    }
  }else{
    hoveredNode=getHoveredNode(mouseX,mouseY);
    stage.style.cursor=(logoHover&&expandProgress<0.15)||hoveredNode>=0?'pointer':'default';
  }
});
stage.addEventListener('click',e=>{
  const r=stage.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;

  // ① Main logo expand
  if(isOverLogo(mx,my)&&expandProgress<0.05&&state!=='collapsing'){
    VENTURES.forEach((v,i)=>{
      if(v.fromDot>=0){const p=getDotCurrentPos(v.fromDot);dotStartX[i]=p.x;dotStartY[i]=p.y;}
      else{const a=toRad(v.angle)+slowOrbit*0.00004;dotStartX[i]=cx+Math.cos(a)*RING_OUTER*scale;dotStartY[i]=cy+Math.sin(a)*RING_OUTER*scale;}
    });
    state='expanding';hint.style.opacity='0';return;
  }

  // ② Center collapse (collapses everything including sub-nodes)
  if(state==='expanded'&&isOverCenter(mx,my)){triggerCollapse();return;}

  // ③ Sub-node click → navigate to URL (same tab)
  if(state==='expanded'&&subNodeState==='expanded'){
    const hsn=getHoveredSubNode(mx,my);
    if(hsn>=0){
      window.location.href=SUB_NODE_DATA[VENTURES[activeVentureIdx].name][hsn].url;
      return;
    }
  }

  // ④ Venture node click → expand sub-nodes, or collapse if same node clicked again
  const hn=getHoveredNode(mx,my);
  if(hn>=0){
    if(hn===activeVentureIdx&&subNodeState!=='idle'){
      // Same node: collapse sub-nodes
      for(let i=0;i<MAX_SUBNODES;i++){
        subNodeCollapseStartX[i]=subNodeX[i];
        subNodeCollapseStartY[i]=subNodeY[i];
      }
      subNodeCollapseProgress=0;subNodeState='collapsing';subNodeHP.fill(0);
    }else{
      // Different/new node: immediately open sub-nodes (any previous set vanishes)
      activeVentureIdx=hn;
      subNodeProgress=0;subNodeState='expanding';subNodeHP.fill(0);
      subNodeLabelEls.forEach(el=>el.style.opacity='0');
      // Start sub-nodes at parent position
      for(let i=0;i<MAX_SUBNODES;i++){subNodeX[i]=nodeX[hn];subNodeY[i]=nodeY[hn];}
    }
    hint.textContent='→ '+VENTURES[hn].name.toLowerCase();
    hint.style.color=VENTURES[hn].color;hint.style.opacity='0.7';
    return;
  }
});
stage.addEventListener('mouseleave',()=>{logoHover=false;hoveredNode=-1;mouseX=cx;mouseY=cy;if(state==='hover-logo'){state='idle';hint.style.opacity='1';}});

// ── Touch support ────────────────────────────────────────────────────────────
function getTouchPos(e){
  const r=stage.getBoundingClientRect();
  const t=e.changedTouches[0];
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}
stage.addEventListener('touchstart',e=>{
  e.preventDefault();
  const {x,y}=getTouchPos(e);
  mouseX=x;mouseY=y;
  // Mirror hover state for visual feedback
  const over=isOverLogo(x,y);
  if(over&&state==='idle'){state='hover-logo';hint.style.opacity='0';}
},{passive:false});

stage.addEventListener('touchmove',e=>{
  e.preventDefault();
  const {x,y}=getTouchPos(e);
  mouseX=x;mouseY=y;
  hoveredSubNode=getHoveredSubNode(x,y);
  hoveredNode=getHoveredNode(x,y);
},{passive:false});

stage.addEventListener('touchend',e=>{
  e.preventDefault();
  const {x,y}=getTouchPos(e);

  // ① Main logo expand
  if(isOverLogo(x,y)&&expandProgress<0.05&&state!=='collapsing'){
    VENTURES.forEach((v,i)=>{
      if(v.fromDot>=0){const p=getDotCurrentPos(v.fromDot);dotStartX[i]=p.x;dotStartY[i]=p.y;}
      else{const a=toRad(v.angle)+slowOrbit*0.00004;dotStartX[i]=cx+Math.cos(a)*RING_OUTER*scale;dotStartY[i]=cy+Math.sin(a)*RING_OUTER*scale;}
    });
    state='expanding';hint.style.opacity='0';return;
  }

  // ② Center collapse
  if(state==='expanded'&&isOverCenter(x,y)){triggerCollapse();return;}

  // ③ Sub-node tap → navigate
  if(state==='expanded'&&subNodeState==='expanded'){
    const hsn=getHoveredSubNode(x,y);
    if(hsn>=0){window.location.href=SUB_NODE_DATA[VENTURES[activeVentureIdx].name][hsn].url;return;}
  }

  // ④ Venture node tap
  const hn=getHoveredNode(x,y);
  if(hn>=0){
    if(hn===activeVentureIdx&&subNodeState!=='idle'){
      for(let i=0;i<MAX_SUBNODES;i++){subNodeCollapseStartX[i]=subNodeX[i];subNodeCollapseStartY[i]=subNodeY[i];}
      subNodeCollapseProgress=0;subNodeState='collapsing';subNodeHP.fill(0);
    }else{
      activeVentureIdx=hn;
      subNodeProgress=0;subNodeState='expanding';subNodeHP.fill(0);
      subNodeLabelEls.forEach(el=>el.style.opacity='0');
      for(let i=0;i<MAX_SUBNODES;i++){subNodeX[i]=nodeX[hn];subNodeY[i]=nodeY[hn];}
    }
    hint.textContent='→ '+VENTURES[hn].name.toLowerCase();
    hint.style.color=VENTURES[hn].color;hint.style.opacity='0.7';
  }
},{passive:false});

function drawRing(){
  ctx.save();ctx.translate(cx,cy);
  const ro=RING_OUTER*scale, ri=RING_INNER*scale;
  if(logoHover&&expandProgress<0.08){ctx.beginPath();ctx.arc(0,0,ro+14*scale,0,Math.PI*2);ctx.arc(0,0,ro+3*scale,0,Math.PI*2,true);ctx.fillStyle=RING_COLOR;ctx.fill();}
  ctx.beginPath();ctx.arc(0,0,ro,0,Math.PI*2);ctx.arc(0,0,ri,0,Math.PI*2,true);ctx.fillStyle=RING_COLOR;ctx.fill();ctx.restore();
}
function drawDots(alpha){
  if(alpha<=0)return;const orbitT=time*0.003;
  DOT_POSITIONS.forEach((d,i)=>{const angle=Math.atan2(d[1],d[0])+orbitT;const dist=(Math.hypot(d[0],d[1])+Math.sin(time*0.025+i*1.1)*1.5)*scale;ctx.globalAlpha=alpha;ctx.beginPath();ctx.arc(cx+Math.cos(angle)*dist,cy+Math.sin(angle)*dist,DOT_RADIUS*scale,0,Math.PI*2);ctx.fillStyle=DOT_COLOR;ctx.fill();});ctx.globalAlpha=1;
}
function drawTravelingDots(prog){
  const tp=easeOut(clamp01(prog/TRAVEL_END));
  const xt=clamp01((prog-XFADE_START)/(TRAVEL_END-XFADE_START));
  const ta=1-xt;
  VENTURES.forEach((v,i)=>{
    const anc=getNodeAnchor(v);
    const px=lerp(dotStartX[i],anc.x,tp);
    const py=lerp(dotStartY[i],anc.y,tp);
    const hex=v.color.replace('#','');
    const r2=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b2=parseInt(hex.slice(4,6),16);
    const startSize=v.fromDot>=0?DOT_RADIUS*scale:3*scale;
    const nodeAlpha=v.fromDot>=0?ta*0.92:easeOutSoft(tp)*ta*0.88;
    ctx.globalAlpha=nodeAlpha;ctx.beginPath();
    ctx.arc(px,py,lerp(startSize,NODE_SIZE*scale,tp),0,Math.PI*2);
    ctx.fillStyle=`rgb(${Math.round(lerp(DOT_R,r2,tp))},${Math.round(lerp(DOT_G,g2,tp))},${Math.round(lerp(DOT_B,b2,tp))})`;
    ctx.fill();
    if(v.fromDot<0){nodeX[i]=px;nodeY[i]=py;}
  });ctx.globalAlpha=1;
}
function updateNodePositions(dt){
  VENTURES.forEach((v,i)=>{const anc=getNodeAnchor(v),hp=nodeHP[i];if(hp>0){const dx=mouseX-anc.x,dy=mouseY-anc.y,dist=Math.hypot(dx,dy);const cd=Math.min(dist,MAX_PULL);const tx=dist>0?anc.x+(dx/dist)*cd*hp:anc.x;const ty=dist>0?anc.y+(dy/dist)*cd*hp:anc.y;const fs=CURSOR_FOLLOW*(dt/16);nodeX[i]+=(tx-nodeX[i])*fs;nodeY[i]+=(ty-nodeY[i])*fs;}else{const dr=getDrift(i,time,driftOpenFactor(i,expandProgress));const rs=0.025*(dt/16);nodeX[i]+=(anc.x+dr.x-nodeX[i])*rs;nodeY[i]+=(anc.y+dr.y-nodeY[i])*rs;}});
}
function drawSettledNodes(prog){
  const xt=clamp01((prog-XFADE_START)/(TRAVEL_END-XFADE_START));const ba=easeOutSoft(xt);
  VENTURES.forEach((v,i)=>{
    if(ba<=0)return;
    const px=nodeX[i],py=nodeY[i];
    const eHp=easeInOutSoft(nodeHP[i]);
    const isActive=(i===activeVentureIdx&&subNodeState!=='idle');

    ctx.save();
    if(isActive){
      ctx.globalAlpha=ba;
      ctx.beginPath();
      ctx.arc(px,py,NODE_SIZE*scale+4*scale,0,Math.PI*2);
      ctx.arc(px,py,NODE_SIZE*scale-3*scale,0,Math.PI*2,true);
      ctx.fillStyle=v.color;ctx.fill();
    }else{
      ctx.globalAlpha=ba*(1-eHp*0.35);
      ctx.beginPath();ctx.arc(px,py,NODE_SIZE*scale,0,Math.PI*2);
      ctx.fillStyle=v.color;ctx.fill();
      if(nodeHP[i]>0){
        ctx.globalAlpha=ba*eHp*0.92;
        ctx.beginPath();ctx.arc(px,py,lerp(NODE_SIZE*scale,NODE_SIZE*scale+14*scale,eHp),0,Math.PI*2);
        ctx.arc(px,py,lerp(NODE_SIZE*scale,NODE_SIZE*scale+9*scale,eHp),0,Math.PI*2,true);
        ctx.fillStyle=v.color;ctx.fill();
      }
    }
    const el=nodeLabelEls[i];
    if(ba>0.25){el.style.opacity=String(lerp(ba*0.4,ba,eHp));el.style.left=px+'px';el.style.top=(py+NODE_SIZE*scale+18)+'px';}
    else el.style.opacity='0';
    // Description — italic serif, fades in on hover, hides when sub-nodes are open
    const descEl=nodeDescEls[i];
    const isActiveWithSubs=(i===activeVentureIdx&&subNodeState!=='idle');
    if(ba>0.25&&eHp>0.02&&!isActiveWithSubs){descEl.style.opacity=String(ba*eHp*0.7);descEl.style.left=px+'px';descEl.style.top=(py+NODE_SIZE*scale+34)+'px';}
    else descEl.style.opacity='0';
    ctx.restore();
  });
}
function drawCollapsingNodes(cp){
  const prog=easeInOut(cp);
  VENTURES.forEach((v,i)=>{
    if(v.fromDot<0){
      const edge=getRingEdgeForNode(v);
      ctx.globalAlpha=(1-prog)*0.88;ctx.beginPath();
      ctx.arc(lerp(collapseStartX[i],edge.x,prog),lerp(collapseStartY[i],edge.y,prog),lerp(NODE_SIZE*scale,3*scale,prog),0,Math.PI*2);
      ctx.fillStyle=v.color;ctx.fill();
    }else{
      const dt2=getDotTargetPos(v.fromDot);
      const hex=v.color.replace('#','');
      const r2=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b2=parseInt(hex.slice(4,6),16);
      ctx.globalAlpha=0.92;ctx.beginPath();
      ctx.arc(lerp(collapseStartX[i],dt2.x,prog),lerp(collapseStartY[i],dt2.y,prog),lerp(NODE_SIZE*scale,DOT_RADIUS*scale,prog),0,Math.PI*2);
      ctx.fillStyle=`rgb(${Math.round(lerp(r2,DOT_R,prog))},${Math.round(lerp(g2,DOT_G,prog))},${Math.round(lerp(b2,DOT_B,prog))})`;
      ctx.fill();
    }
  });ctx.globalAlpha=1;
}

const SUB_HOVER_OUT     = 0.002;
const SUB_CURSOR_FOLLOW = 0.08;
const SUB_MAX_PULL      = 20;
const MAX_SUBNODES      = 5;

// Sub-node runtime state
let activeVentureIdx        = -1;     // which venture has sub-nodes open; -1 = none
let subNodeState            = 'idle'; // 'idle' | 'expanding' | 'expanded' | 'collapsing'
let subNodeProgress         = 0;
let subNodeCollapseProgress = 0;
let hoveredSubNode          = -1;

const subNodeX             = new Array(MAX_SUBNODES).fill(0);
const subNodeY             = new Array(MAX_SUBNODES).fill(0);
const subNodeHP            = new Array(MAX_SUBNODES).fill(0); // hover progress per sub-node
const subNodeCollapseStartX= new Array(MAX_SUBNODES).fill(0);
const subNodeCollapseStartY= new Array(MAX_SUBNODES).fill(0);

// Build sub-node label DOM elements (Times New Roman, lowercase)
const subNodeLabelsDiv = document.getElementById('sub-node-labels');
let subNodeLabelEls = [];
for(let i = 0; i < MAX_SUBNODES; i++){
  const el = document.createElement('div');
  el.className = 'sub-node-label';
  subNodeLabelsDiv.appendChild(el);
  subNodeLabelEls.push(el);
}

// ── Helper: world position of sub-node i for the given venture ───────────────
// Sub-nodes orbit the parent in a full circle, evenly spaced.
// First node is aligned outward (away from center) so the cluster feels grounded.
function getSubNodeTargetPos(ventureIdx, subIdx){
  const px = nodeX[ventureIdx], py = nodeY[ventureIdx];
  const outAngle = Math.atan2(py - cy, px - cx);
  const subs = SUB_NODE_DATA[VENTURES[ventureIdx].name];
  const n = subs.length;
  const angle = outAngle + (subIdx / n) * Math.PI * 2;
  return { x: px + Math.cos(angle) * SUB_NODE_DIST * scale,
           y: py + Math.sin(angle) * SUB_NODE_DIST * scale };
}

// ── Helper: staggered arrival factor for sub-node i during expansion ─────────
function getSubEp(i, n){
  if(subNodeState === 'expanded') return 1;
  const delay = (i / n) * 0.30; // each node starts slightly later
  return easeOut(clamp01((subNodeProgress - delay) / (1 - delay + 0.001)));
}

// ── Helper: returns index of sub-node under cursor, or -1 ───────────────────
function getHoveredSubNode(mx, my){
  if(activeVentureIdx < 0 || subNodeState !== 'expanded') return -1;
  const subs = SUB_NODE_DATA[VENTURES[activeVentureIdx].name];
  for(let i = 0; i < subs.length; i++){
    if(Math.hypot(mx - subNodeX[i], my - subNodeY[i]) < 28) return i;
  }
  return -1;
}

// ── Shape drawing: sacred geometry path for each venture ────────────────────
// All shapes drawn relative to (x, y) with circumradius r.
function drawSubShape(x, y, r, shape){
  ctx.beginPath();
  switch(shape){
    case 'triangle-up':
      // Equilateral triangle — fire, upward energy
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.866, y + r * 0.5);
      ctx.lineTo(x - r * 0.866, y + r * 0.5);
      break;
    case 'triangle-down':
      // Equilateral triangle — water, receptive downward
      ctx.moveTo(x, y + r);
      ctx.lineTo(x + r * 0.866, y - r * 0.5);
      ctx.lineTo(x - r * 0.866, y - r * 0.5);
      break;
    case 'hexagon':
      // Flat-top regular hexagon
      for(let i = 0; i < 6; i++){
        const a = i * Math.PI / 3;
        i === 0 ? ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
                : ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
      }
      break;
    case 'pentagon':
      // Regular pentagon, point up
      for(let i = 0; i < 5; i++){
        const a = i * 2 * Math.PI / 5 - Math.PI / 2;
        i === 0 ? ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
                : ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
      }
      break;
    case 'vesica':
      // Vesica piscis / lens — two intersecting arcs, Bezier approximation
      {
        const w = r * 0.55, h = r * 1.05;
        ctx.moveTo(x, y - h);
        ctx.bezierCurveTo(x + w*1.4, y - h*0.35, x + w*1.4, y + h*0.35, x, y + h);
        ctx.bezierCurveTo(x - w*1.4, y + h*0.35, x - w*1.4, y - h*0.35, x, y - h);
      }
      break;
    case 'pentagram':
      // 5-pointed star, point up, inner radius ≈ 0.38× outer
      for(let i = 0; i < 10; i++){
        const a = i * Math.PI / 5 - Math.PI / 2;
        const ri = i % 2 === 0 ? r : r * 0.38;
        i === 0 ? ctx.moveTo(x + Math.cos(a)*ri, y + Math.sin(a)*ri)
                : ctx.lineTo(x + Math.cos(a)*ri, y + Math.sin(a)*ri);
      }
      break;
    case 'star6':
      // 6-pointed star (Star of David), point up, inner radius ≈ 0.45×
      for(let i = 0; i < 12; i++){
        const a = i * Math.PI / 6 - Math.PI / 2;
        const ri = i % 2 === 0 ? r : r * 0.45;
        i === 0 ? ctx.moveTo(x + Math.cos(a)*ri, y + Math.sin(a)*ri)
                : ctx.lineTo(x + Math.cos(a)*ri, y + Math.sin(a)*ri);
      }
      break;
    case 'octagon':
      // Regular octagon
      for(let i = 0; i < 8; i++){
        const a = i * Math.PI / 4 + Math.PI / 8;
        i === 0 ? ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
                : ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
      }
      break;
    case 'square':
      // Axis-aligned square
      {
        const s = r * 0.82;
        ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y - s);
        ctx.lineTo(x + s, y + s); ctx.lineTo(x - s, y + s);
      }
      break;
    default:
      ctx.arc(x, y, r, 0, Math.PI * 2);
  }
  ctx.closePath();
}

// ── Sub-node cursor follow (expanded state only) ─────────────────────────────
function updateSubNodePositions(dt){
  if(activeVentureIdx < 0) return;
  const subs = SUB_NODE_DATA[VENTURES[activeVentureIdx].name];
  subs.forEach((_, i) => {
    const tgt = getSubNodeTargetPos(activeVentureIdx, i);
    const hp = subNodeHP[i];
    if(hp > 0){
      // Pull toward cursor, capped at SUB_MAX_PULL
      const dx = mouseX - tgt.x, dy = mouseY - tgt.y;
      const dist = Math.hypot(dx, dy) || 0.001;
      const pull = Math.min(dist, SUB_MAX_PULL);
      const tx = tgt.x + (dx / dist) * pull * hp;
      const ty = tgt.y + (dy / dist) * pull * hp;
      const fs = SUB_CURSOR_FOLLOW * (dt / 16);
      subNodeX[i] += (tx - subNodeX[i]) * fs;
      subNodeY[i] += (ty - subNodeY[i]) * fs;
    } else {
      // Drift back to anchor
      const rs = 0.025 * (dt / 16);
      subNodeX[i] += (tgt.x - subNodeX[i]) * rs;
      subNodeY[i] += (tgt.y - subNodeY[i]) * rs;
    }
  });
}

// ── Main sub-node draw call ──────────────────────────────────────────────────
function drawSubNodes(){
  if(activeVentureIdx < 0 || subNodeState === 'idle') return;
  const v = VENTURES[activeVentureIdx];
  const subs = SUB_NODE_DATA[v.name];
  const shape = SUB_SHAPES[v.name];
  const n = subs.length;

  if(subNodeState === 'expanding' || subNodeState === 'expanded'){
    subs.forEach((sub, i) => {
      const ep = getSubEp(i, n);        // 0→1 arrival factor
      const sx = subNodeX[i], sy = subNodeY[i];
      const drawR = lerp(3*scale, SUB_NODE_RADIUS*scale, ep);
      const alpha = ep * 0.88;

      ctx.save();

      // Shape — dims slightly on hover to make halo pop
      ctx.globalAlpha = alpha * (1 - subNodeHP[i] * 0.22);
      ctx.fillStyle = v.color;
      drawSubShape(sx, sy, drawR, shape);
      ctx.fill();

      // Hover halo — open ring, same color as venture
      if(subNodeHP[i] > 0 && ep > 0.7){
        ctx.globalAlpha = alpha * subNodeHP[i] * 0.78;
        ctx.beginPath();
        ctx.arc(sx, sy, SUB_NODE_RADIUS*scale + 8*scale, 0, Math.PI * 2);
        ctx.arc(sx, sy, SUB_NODE_RADIUS*scale + 3*scale, 0, Math.PI * 2, true);
        ctx.fillStyle = v.color;
        ctx.fill();
      }
      ctx.restore();

      // Label — Times New Roman, lowercase, fades in with shape
      const el = subNodeLabelEls[i];
      if(el && ep > 0.35){
        el.textContent = sub.name;
        el.style.color = v.color;
        el.style.opacity = String(ep * (0.65 + subNodeHP[i] * 0.25));
        el.style.left = sx + 'px';
        el.style.top  = (sy + SUB_NODE_RADIUS*scale + 14) + 'px';
      } else if(el){
        el.style.opacity = '0';
      }
    });

  } else if(subNodeState === 'collapsing'){
    // Animate sub-nodes back to parent position
    const cp = easeInOut(subNodeCollapseProgress);
    const destX = nodeX[activeVentureIdx]; // target: live parent position
    const destY = nodeY[activeVentureIdx];

    subs.forEach((_, i) => {
      const sx = lerp(subNodeCollapseStartX[i], destX, cp);
      const sy = lerp(subNodeCollapseStartY[i], destY, cp);
      const alpha = (1 - cp) * 0.88;
      const drawR = lerp(SUB_NODE_RADIUS*scale, 3*scale, cp);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = v.color;
      drawSubShape(sx, sy, drawR, shape);
      ctx.fill();
      ctx.restore();

      if(subNodeLabelEls[i]){
        subNodeLabelEls[i].style.opacity = String((1 - cp) * 0.65);
        subNodeLabelEls[i].style.left = sx + 'px';
        subNodeLabelEls[i].style.top  = (sy + SUB_NODE_RADIUS*scale + 14) + 'px';
      }
    });
  }
}

function tick(ts){
  if(!lastT)lastT=ts;const dt=Math.min(ts-lastT,50);lastT=ts;time+=dt;slowOrbit+=dt;

  // ── Main state machine ──
  if(state==='expanding'){expandProgress=Math.min(expandProgress+dt*EXPAND_SPEED,1);if(expandProgress>=1)state='expanded';}
  if(state==='collapsing'){collapseProgress=Math.min(collapseProgress+dt*COLLAPSE_SPEED,1);if(collapseProgress>=1){state='idle';expandProgress=0;collapseProgress=0;nodePosInit=false;nodeHP.fill(0);hint.style.opacity='1';hint.style.color='#FCB86733';hint.textContent='HOVER THE CONSTRUCT';}}
  // Descriptor fades in once expansion is well underway, out on collapse
  wordmarkDesc.style.opacity = String(easeOutSoft(clamp01((expandProgress-0.5)/0.5)) * (1-collapseProgress));
  VENTURES.forEach((v,i)=>{const target=hoveredNode===i?1:0;nodeHP[i]=target>nodeHP[i]?Math.min(nodeHP[i]+dt*HOVER_IN,1):Math.max(nodeHP[i]-dt*HOVER_OUT,0);});
  if(!nodePosInit&&expandProgress>=XFADE_START){VENTURES.forEach((v,i)=>{const anc=getNodeAnchor(v);nodeX[i]=anc.x;nodeY[i]=anc.y;});nodePosInit=true;}
  if(nodePosInit&&state!=='collapsing')updateNodePositions(dt);

  // ── Sub-node state machine ──
  if(subNodeState==='expanding'){
    subNodeProgress=Math.min(subNodeProgress+dt*SUB_EXPAND_SPEED,1);
    if(subNodeProgress>=1)subNodeState='expanded';
  }
  if(subNodeState==='collapsing'){
    subNodeCollapseProgress=Math.min(subNodeCollapseProgress+dt*SUB_COLLAPSE_SPEED,1);
    if(subNodeCollapseProgress>=1){
      subNodeState='idle';activeVentureIdx=-1;
      subNodeLabelEls.forEach(el=>el.style.opacity='0');
    }
  }

  // Sub-node hover progress
  for(let i=0;i<MAX_SUBNODES;i++){
    const t=hoveredSubNode===i?1:0;
    subNodeHP[i]=t>subNodeHP[i]?Math.min(subNodeHP[i]+dt*SUB_HOVER_IN,1):Math.max(subNodeHP[i]-dt*SUB_HOVER_OUT,0);
  }

  // Sub-node position updates (expanding: lerp outward; expanded: cursor follow)
  if(activeVentureIdx>=0&&nodePosInit){
    if(subNodeState==='expanding'){
      const subs=SUB_NODE_DATA[VENTURES[activeVentureIdx].name];const n=subs.length;
      subs.forEach((_,i)=>{
        const ep=getSubEp(i,n);
        const tgt=getSubNodeTargetPos(activeVentureIdx,i);
        // Origin follows live parent position so emanation stays attached
        subNodeX[i]=lerp(nodeX[activeVentureIdx],tgt.x,ep);
        subNodeY[i]=lerp(nodeY[activeVentureIdx],tgt.y,ep);
      });
    }else if(subNodeState==='expanded'){
      updateSubNodePositions(dt);
    }
  }

  // ── Render ──
  ctx.fillStyle=BG_COLOR;ctx.fillRect(0,0,W,H);
  drawEyes(time);
  updateParticles(dt,time);
  drawRing();

  if(state==='idle'||state==='hover-logo'){drawDots(1);}
  else if(state==='expanding'){drawTravelingDots(expandProgress);if(expandProgress>=XFADE_START)drawSettledNodes(expandProgress);}
  else if(state==='expanded'){drawSettledNodes(1);drawSubNodes();}
  else if(state==='collapsing'){drawCollapsingNodes(collapseProgress);}

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
